<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>タイピング練習</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#f6f7fb;
      --panel2:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#d7dbe6;
      --danger:#dc2626;

      --key:#ffffff;
      --keyText:#0f172a;
      --hit:#111827;

      --thumb:#dbeafe;
      --index:#dcfce7;
      --middle:#fef9c3;
      --ring:#ffe4e6;
      --pinky:#f3e8ff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    }
    header{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:var(--panel2);
      position:sticky; top:0; z-index:10;
    }
    h1{ margin:0; font-size:18px; font-weight:700; }

    main{
      max-width:980px;
      margin:0 auto;
      padding:14px 12px 40px;
      display:grid;
      gap:12px;
    }

    .bar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    select, button{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
    }
    button{ cursor:pointer; }
    .badge{
      display:inline-block;
      border:1px solid var(--line);
      background:var(--panel2);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .promptTitle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:12px;
      margin-bottom:10px;
    }
    .station{
      font-size:40px;
      line-height:1.1;
      font-weight:800;
      letter-spacing:0.2px;
      margin:0 0 8px;
    }
    .roma{
      font-size:26px;
      line-height:1.2;
      font-weight:700;
      margin:0 0 10px;
      color:var(--text);
    }
    .typedLine{
      display:flex;
      align-items:baseline;
      gap:10px;
      flex-wrap:wrap;
    }
    .typedLabel{
      color:var(--muted);
      font-size:12px;
    }
    .typedText{
      font-size:22px;
      font-weight:700;
      letter-spacing:0.6px;
      color:var(--danger);
      min-height:28px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .inputWrap{
      margin-top:10px;
    }
    input[type="text"]{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      padding:14px 14px;
      font-size:20px;
      outline:none;
    }
    .smallRow{
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      color:var(--muted);
      font-size:12px;
    }

    /* Keyboard (no label, no space row) */
    .kbd{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      touch-action:manipulation;
    }
    .kbd svg{ width:860px; height:auto; display:block; }

    .key{ fill:var(--key); stroke:var(--line); stroke-width:1; }
    .keyText{
      fill:var(--keyText);
      font-size:12px;
      text-anchor:middle;
      dominant-baseline:middle;
      pointer-events:none;
      user-select:none;
    }
    .finger-L_THUMB,.finger-R_THUMB{ fill: color-mix(in srgb, var(--thumb) 75%, var(--key)); }
    .finger-L_INDEX,.finger-R_INDEX{ fill: color-mix(in srgb, var(--index) 75%, var(--key)); }
    .finger-L_MIDDLE,.finger-R_MIDDLE{ fill: color-mix(in srgb, var(--middle) 75%, var(--key)); }
    .finger-L_RING,.finger-R_RING{ fill: color-mix(in srgb, var(--ring) 75%, var(--key)); }
    .finger-L_PINKY,.finger-R_PINKY{ fill: color-mix(in srgb, var(--pinky) 75%, var(--key)); }
    .hit{
      stroke:var(--hit);
      stroke-width:2.4;
      filter: drop-shadow(0 0 6px rgba(17,24,39,0.20));
    }

    /* Result overlay */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:100;
    }
    .modal{
      width:min(640px, 100%);
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow: 0 20px 50px rgba(15,23,42,0.25);
    }
    .modal h2{
      margin:0 0 10px;
      font-size:18px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .stat{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:var(--panel);
    }
    .stat .t{ color:var(--muted); font-size:12px; margin-bottom:6px; }
    .stat .v{ font-size:20px; font-weight:800; }
    .modal .actions{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      margin-top:12px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>タイピング練習</h1>
  </header>

  <main>
    <div class="bar">
      <select id="modeSelect">
        <option value="yamanote_inner">山手線：内回り</option>
        <option value="yamanote_outer">山手線：外回り</option>
      </select>
      <button id="restartBtn" type="button">Restart</button>
      <span id="progressBadge" class="badge">-</span>
    </div>

    <section class="card">
      <div class="promptTitle">
        <span id="promptMeta">-</span>
        <span id="lastMeta" style="display:none;">-</span>
      </div>

      <h2 class="station" id="stationJp">-</h2>
      <div class="roma" id="stationRoma">-</div>

      <div class="typedLine">
        <div class="typedLabel">typed</div>
        <div class="typedText" id="typedView"></div>
      </div>

      <div class="inputWrap">
        <input id="typedInput" type="text" autocapitalize="none" autocomplete="off" spellcheck="false" placeholder="ローマ字で入力（変換なし）" />
        <div class="smallRow">
          <button id="clearBtn" type="button">Clear</button>
          <span>（toukyou / tokyo など揺れOK）</span>
        </div>
      </div>
    </section>

    <div class="kbd" id="keyboard"></div>
  </main>

  <!-- Result -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>結果</h2>
      <div class="grid">
        <div class="stat">
          <div class="t">タイム</div>
          <div class="v" id="timeNow">-</div>
        </div>
        <div class="stat">
          <div class="t">ミスタイプ</div>
          <div class="v" id="mistypeNow">-</div>
        </div>
        <div class="stat">
          <div class="t">BESTタイム</div>
          <div class="v" id="bestTime">-</div>
        </div>
        <div class="stat">
          <div class="t">BESTミスタイプ</div>
          <div class="v" id="bestMistype">-</div>
        </div>
      </div>
      <div class="actions">
        <button id="closeBtn" type="button">Close</button>
        <button id="restartBtn2" type="button">Restart</button>
      </div>
    </div>
  </div>

<script>
  const $ = (s)=>document.querySelector(s);

  const modeSelect = $("#modeSelect");
  const restartBtn = $("#restartBtn");
  const progressBadge = $("#progressBadge");

  const stationJpEl = $("#stationJp");
  const stationRomaEl = $("#stationRoma");
  const promptMetaEl = $("#promptMeta");

  const typedInput = $("#typedInput");
  const typedView = $("#typedView");
  const clearBtn = $("#clearBtn");

  const keyboardHost = $("#keyboard");

  const overlay = $("#overlay");
  const closeBtn = $("#closeBtn");
  const restartBtn2 = $("#restartBtn2");

  const timeNowEl = $("#timeNow");
  const mistypeNowEl = $("#mistypeNow");
  const bestTimeEl = $("#bestTime");
  const bestMistypeEl = $("#bestMistype");

  let prevValue = "";

  // --- Roma normalization (allow variations + long vowels) ---
  // - allow shi/si, chi/ti, tsu/tu, fu/hu, ji/zi
  // - allow sha/sya etc (canonicalize)
  // - allow long vowels: ou/oo/uu/aa/ee/ii collapse to single vowel
  //   ex: toukyou -> tokyo, ootsuka -> otsuka, yuurakuchou -> yurakucho
  function normalizeRoma(s){
    let x = (s || "").toLowerCase().replace(/[^a-z]/g, "");

    // major 3->2 canonical
    x = x.replace(/shi/g, "si")
         .replace(/chi/g, "ti")
         .replace(/tsu/g, "tu");

    // yoon canonical
    x = x.replace(/sha/g, "sya").replace(/shu/g, "syu").replace(/sho/g, "syo")
         .replace(/cha/g, "tya").replace(/chu/g, "tyu").replace(/cho/g, "tyo")
         .replace(/ja/g,  "zya").replace(/ju/g,  "zyu").replace(/jo/g,  "zyo");

    // 2 letters variations
    x = x.replace(/fu/g, "hu")
         .replace(/ji/g, "zi");

    // long vowels (very permissive)
    x = x.replace(/aa/g, "a")
         .replace(/ii/g, "i")
         .replace(/uu/g, "u")
         .replace(/ee/g, "e")
         .replace(/oo/g, "o")
         .replace(/ou/g, "o"); // toukyou -> tokyo, yuurakuchou -> yurakucho (after uu->u and ou->o)

    return x;
  }

  // --- Finger map (US minimal) ---
  const fingerMap = {
    "ENTER":"R_PINKY","BACKSPACE":"R_PINKY",
    "TAB":"L_PINKY","CAPS":"L_PINKY",
    "SHIFT_L":"L_PINKY","SHIFT_R":"R_PINKY",

    "Q":"L_PINKY","W":"L_RING","E":"L_MIDDLE","R":"L_INDEX","T":"L_INDEX",
    "Y":"R_INDEX","U":"R_INDEX","I":"R_MIDDLE","O":"R_RING","P":"R_PINKY",

    "A":"L_PINKY","S":"L_RING","D":"L_MIDDLE","F":"L_INDEX","G":"L_INDEX",
    "H":"R_INDEX","J":"R_INDEX","K":"R_MIDDLE","L":"R_RING",

    "Z":"L_PINKY","X":"L_RING","C":"L_MIDDLE","V":"L_INDEX","B":"L_INDEX",
    "N":"R_INDEX","M":"R_INDEX",

    "1":"L_PINKY","2":"L_RING","3":"L_MIDDLE","4":"L_INDEX","5":"L_INDEX",
    "6":"R_INDEX","7":"R_INDEX","8":"R_MIDDLE","9":"R_RING","0":"R_PINKY",

    "MINUS":"R_PINKY","EQUAL":"R_PINKY",
    "LBRACKET":"R_PINKY","RBRACKET":"R_PINKY","BACKSLASH":"R_PINKY",
    "SEMICOLON":"R_PINKY","QUOTE":"R_PINKY",
    "COMMA":"R_MIDDLE","DOT":"R_RING","SLASH":"R_PINKY",
    "BACKTICK":"L_PINKY"
  };

  // --- Yamanote data (JP display + Roma target) ---
  // roma can be string or array; we normalize both sides anyway.
  const yamanote_inner = [
    {jp:"東京", roma:["tokyo","toukyou"]},
    {jp:"有楽町", roma:["yurakucho","yuurakuchou","yurakutyo","yuurakutyou"]},
    {jp:"新橋", roma:["shimbashi","shinbashi","simbasi"]},
    {jp:"浜松町", roma:["hamamatsucho","hamamatsutyo","hamamatsuchou","hamamatsutyou"]},
    {jp:"田町", roma:["tamachi","tamati"]},
    {jp:"高輪ゲートウェイ", roma:["takanawagateway","takanawa gateway"]},
    {jp:"品川", roma:["shinagawa","sinagawa"]},
    {jp:"大崎", roma:["osaki"]},
    {jp:"五反田", roma:["gotanda"]},
    {jp:"目黒", roma:["meguro"]},
    {jp:"恵比寿", roma:["ebisu"]},
    {jp:"渋谷", roma:["shibuya","sibuya"]},
    {jp:"原宿", roma:["harajuku","harazyuku"]},
    {jp:"代々木", roma:["yoyogi"]},
    {jp:"新宿", roma:["shinjuku","sinjuku","sinzyuku"]},
    {jp:"新大久保", roma:["shinokubo","sinokubo"]},
    {jp:"高田馬場", roma:["takadanobaba"]},
    {jp:"目白", roma:["mejiro","meziro"]},
    {jp:"池袋", roma:["ikebukuro"]},
    {jp:"大塚", roma:["otsuka","ootsuka"]},
    {jp:"巣鴨", roma:["sugamo"]},
    {jp:"駒込", roma:["komagome"]},
    {jp:"田端", roma:["tabata"]},
    {jp:"西日暮里", roma:["nishinippori","nisinippori"]},
    {jp:"日暮里", roma:["nippori"]},
    {jp:"鶯谷", roma:["uguisudani"]},
    {jp:"上野", roma:["ueno"]},
    {jp:"御徒町", roma:["okachimachi","okatimati"]},
    {jp:"秋葉原", roma:["akihabara"]},
    {jp:"神田", roma:["kanda"]}
  ];

  const yamanote_outer = [
    {jp:"東京", roma:["tokyo","toukyou"]},
    {jp:"神田", roma:["kanda"]},
    {jp:"秋葉原", roma:["akihabara"]},
    {jp:"御徒町", roma:["okachimachi","okatimati"]},
    {jp:"上野", roma:["ueno"]},
    {jp:"鶯谷", roma:["uguisudani"]},
    {jp:"日暮里", roma:["nippori"]},
    {jp:"西日暮里", roma:["nishinippori","nisinippori"]},
    {jp:"田端", roma:["tabata"]},
    {jp:"駒込", roma:["komagome"]},
    {jp:"巣鴨", roma:["sugamo"]},
    {jp:"大塚", roma:["otsuka","ootsuka"]},
    {jp:"池袋", roma:["ikebukuro"]},
    {jp:"目白", roma:["mejiro","meziro"]},
    {jp:"高田馬場", roma:["takadanobaba"]},
    {jp:"新大久保", roma:["shinokubo","sinokubo"]},
    {jp:"新宿", roma:["shinjuku","sinjuku","sinzyuku"]},
    {jp:"代々木", roma:["yoyogi"]},
    {jp:"原宿", roma:["harajuku","harazyuku"]},
    {jp:"渋谷", roma:["shibuya","sibuya"]},
    {jp:"恵比寿", roma:["ebisu"]},
    {jp:"目黒", roma:["meguro"]},
    {jp:"五反田", roma:["gotanda"]},
    {jp:"大崎", roma:["osaki"]},
    {jp:"品川", roma:["shinagawa","sinagawa"]},
    {jp:"高輪ゲートウェイ", roma:["takanawagateway","takanawa gateway"]},
    {jp:"田町", roma:["tamachi","tamati"]},
    {jp:"浜松町", roma:["hamamatsucho","hamamatsutyo","hamamatsuchou","hamamatsutyou"]},
    {jp:"新橋", roma:["shimbashi","shinbashi","simbasi"]},
    {jp:"有楽町", roma:["yurakucho","yuurakuchou","yurakutyo","yuurakutyou"]}
  ];

  const state = {
    mode: "yamanote_inner",
    idx: 0,
    started: false,
    startMs: 0,
    finishMs: 0,
    mistype: 0
  };

  function dataset(){
    return state.mode === "yamanote_outer" ? yamanote_outer : yamanote_inner;
  }

  function bestKey(modeKey){ return `best_${modeKey}`; }
  function loadBest(modeKey){
    try{
      const raw = localStorage.getItem(bestKey(modeKey));
      if(!raw) return null;
      return JSON.parse(raw); // { timeMs, mistype }
    }catch{ return null; }
  }
  function formatTime(ms){ return (ms/1000).toFixed(1) + " sec"; }
  function renderBest(modeKey){
    const b = loadBest(modeKey);
    if(!b){
      bestTimeEl.textContent = "-";
      bestMistypeEl.textContent = "-";
      return;
    }
    bestTimeEl.textContent = formatTime(b.timeMs);
    bestMistypeEl.textContent = String(b.mistype);
  }
  function isNewRecord(newRec, oldRec){
    if(!oldRec) return true;
    if(newRec.timeMs < oldRec.timeMs) return true;
    if(newRec.timeMs > oldRec.timeMs) return false;
    return newRec.mistype < oldRec.mistype;
  }
  function saveBestIfNeeded(modeKey, timeMs, mistype){
    const newRec = { timeMs, mistype };
    const oldRec = loadBest(modeKey);
    if(isNewRecord(newRec, oldRec)){
      localStorage.setItem(bestKey(modeKey), JSON.stringify(newRec));
    }
    renderBest(modeKey);
  }

  function currentTargets(){
    const d = dataset();
    if(state.idx >= d.length) return [];
    const r = d[state.idx].roma;
    const list = Array.isArray(r) ? r : [r];
    return list.map(normalizeRoma);
  }

  function updateUI(){
    const d = dataset();
    const total = d.length;

    if(state.idx >= total){
      progressBadge.textContent = `Finish · ${total}/${total}`;
      promptMetaEl.textContent = "完了";
      stationJpEl.textContent = "完了";
      stationRomaEl.textContent = "";
      return;
    }

    const cur = d[state.idx];
    progressBadge.textContent = `${state.idx+1}/${total}`;
    promptMetaEl.textContent = `${state.mode === "yamanote_outer" ? "山手線 外回り" : "山手線 内回り"}`;
    stationJpEl.textContent = cur.jp;

    // 代表表示は最初の候補（正規化後）を出す（見やすさ優先）
    const displayRoma = normalizeRoma(Array.isArray(cur.roma) ? cur.roma[0] : cur.roma);
    stationRomaEl.textContent = displayRoma;

    typedView.textContent = typedInput.value || "";
  }

  function resetRun(){
    state.idx = 0;
    state.started = false;
    state.startMs = 0;
    state.finishMs = 0;
    state.mistype = 0;
    typedInput.value = "";
    prevValue = "";
    typedView.textContent = "";
    overlay.style.display = "none";
    updateUI();
  }

  function startIfNeeded(){
    if(state.started) return;
    state.started = true;
    state.startMs = performance.now();
  }

  function finish(){
    if(state.finishMs) return;
    state.finishMs = performance.now();
    const elapsed = Math.max(0, state.finishMs - state.startMs);

    timeNowEl.textContent = formatTime(elapsed);
    mistypeNowEl.textContent = String(state.mistype);

    saveBestIfNeeded(state.mode, elapsed, state.mistype);

    overlay.style.display = "flex";
  }

  // Mistype rule (stable):
  // 入力（正規化）が「どの正解候補のprefixにもなってない」状態にした入力イベントを 1ミスとして数える。
  function scoreMistype(){
    const targets = currentTargets();
    if(targets.length === 0) return;

    const curNorm = normalizeRoma(typedInput.value);
    const isPrefix = targets.some(t => t.startsWith(curNorm));
    if(!isPrefix){
      state.mistype += 1;
    }
  }

  function tryAdvance(){
    const targets = currentTargets();
    if(targets.length === 0) return;

    const curNorm = normalizeRoma(typedInput.value);
    const ok = targets.some(t => t === curNorm);

    if(ok){
      state.idx += 1;
      typedInput.value = "";
      prevValue = "";
      typedView.textContent = "";

      const total = dataset().length;
      if(state.idx >= total){
        updateUI();
        finish();
        return;
      }
      updateUI();
    }
  }

  function delta(prev,next){
    if(next.startsWith(prev)) return next.slice(prev.length);
    return "";
  }

  // Keyboard rendering (no space row)
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, (c)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }
  function fingerClass(keyId){
    const f = fingerMap[keyId];
    return f ? `finger-${f}` : "";
  }
  function renderKeyboard(){
    const rows = [
      [{id:"BACKTICK",label:"`"},{id:"1",label:"1"},{id:"2",label:"2"},{id:"3",label:"3"},{id:"4",label:"4"},
       {id:"5",label:"5"},{id:"6",label:"6"},{id:"7",label:"7"},{id:"8",label:"8"},{id:"9",label:"9"},
       {id:"0",label:"0"},{id:"MINUS",label:"-"},{id:"EQUAL",label:"="},{id:"BACKSPACE",label:"⌫",w:1.6}],
      [{id:"TAB",label:"Tab",w:1.3},{id:"Q",label:"Q"},{id:"W",label:"W"},{id:"E",label:"E"},{id:"R",label:"R"},{id:"T",label:"T"},
       {id:"Y",label:"Y"},{id:"U",label:"U"},{id:"I",label:"I"},{id:"O",label:"O"},{id:"P",label:"P"},
       {id:"LBRACKET",label:"["},{id:"RBRACKET",label:"]"},{id:"BACKSLASH",label:"\\",w:1.3}],
      [{id:"CAPS",label:"Caps",w:1.55},{id:"A",label:"A"},{id:"S",label:"S"},{id:"D",label:"D"},{id:"F",label:"F"},{id:"G",label:"G"},
       {id:"H",label:"H"},{id:"J",label:"J"},{id:"K",label:"K"},{id:"L",label:"L"},
       {id:"SEMICOLON",label:";"},{id:"QUOTE",label:"'"},{id:"ENTER",label:"Enter",w:1.75}],
      [{id:"SHIFT_L",label:"Shift",w:2.0},{id:"Z",label:"Z"},{id:"X",label:"X"},{id:"C",label:"C"},{id:"V",label:"V"},{id:"B",label:"B"},
       {id:"N",label:"N"},{id:"M",label:"M"},{id:"COMMA",label:","},{id:"DOT",label:"."},{id:"SLASH",label:"/"},
       {id:"SHIFT_R",label:"Shift",w:2.2}]
      // Space row removed
    ];

    const unit=48, gap=8, h=48, rx=10;
    const rowWidth = (row)=>row.reduce((sum,k)=>sum+(k.w??1)*unit+gap,0)-gap;
    const maxW = Math.max(...rows.map(rowWidth))+24;
    const totalH = rows.length*(h+gap)-gap+24;

    let svg = `<svg viewBox="0 0 ${maxW} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;
    rows.forEach((row,r)=>{
      let x=12, y=12 + r*(h+gap);
      row.forEach((k)=>{
        const w=(k.w??1)*unit;
        const id=`KEY_${k.id}`;
        svg += `
          <g>
            <rect id="${id}" class="key ${fingerClass(k.id)}" x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}"></rect>
            <text class="keyText" x="${x+w/2}" y="${y+h/2}">${escapeHtml(k.label)}</text>
          </g>`;
        x += w + gap;
      });
    });
    svg += `</svg>`;
    keyboardHost.innerHTML = svg;
  }

  function keyEventToKeyId(e){
    const k = e.key;
    if(k==="Enter") return "ENTER";
    if(k==="Backspace") return "BACKSPACE";
    if(k==="Tab") return "TAB";
    if(k==="CapsLock") return "CAPS";
    if(k==="Shift") return (e.location===1 ? "SHIFT_L" : "SHIFT_R");
    if(/^[a-z]$/i.test(k)) return k.toUpperCase();
    if(/^[0-9]$/.test(k)) return k;
    const map = {"-":"MINUS","=":"EQUAL","[":"LBRACKET","]":"RBRACKET","\\":"BACKSLASH",";":"SEMICOLON","'":"QUOTE",",":"COMMA",".":"DOT","/":"SLASH","`":"BACKTICK"};
    return map[k] || "";
  }
  function highlight(keyId){
    document.querySelectorAll(".key.hit").forEach(el=>el.classList.remove("hit"));
    if(!keyId) return;
    const el = document.getElementById(`KEY_${keyId}`);
    if(el) el.classList.add("hit");
  }

  // Events
  modeSelect.addEventListener("change", ()=>{
    state.mode = modeSelect.value;
    resetRun();
    renderBest(state.mode);
    typedInput.focus();
  });

  restartBtn.addEventListener("click", ()=>{
    resetRun();
    renderBest(state.mode);
    typedInput.focus();
  });

  restartBtn2.addEventListener("click", ()=>{
    resetRun();
    renderBest(state.mode);
    typedInput.focus();
  });

  closeBtn.addEventListener("click", ()=>{
    overlay.style.display = "none";
    typedInput.focus();
  });

  clearBtn.addEventListener("click", ()=>{
    typedInput.value = "";
    prevValue = "";
    typedView.textContent = "";
    typedInput.focus();
  });

  window.addEventListener("keydown",(e)=>{
    const id = keyEventToKeyId(e);
    highlight(id);
  });

  typedInput.addEventListener("input", ()=>{
    const next = typedInput.value;
    const added = delta(prevValue, next);

    // show typed in red
    typedView.textContent = next;

    if(next.length > 0) startIfNeeded();

    if(added){
      scoreMistype();
      tryAdvance();
    }

    prevValue = next;
  });

  // Init
  renderKeyboard();
  state.mode = modeSelect.value;
  renderBest(state.mode);
  resetRun();
  typedInput.focus();
</script>
</body>
</html>
