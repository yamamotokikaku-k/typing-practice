<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>五十音 ローマ字タイピング（行ごと・指ガイド）</title>
<style>
  :root{
    --fg:#111; --muted:#666; --line:#e9e9e9; --bg:#fff;
    --red:#b00020; --blue:#1357d6; --ok:#0a7a2f; --gold:#f2b705;
  }
  html,body{height:100%; margin:0; background:var(--bg); color:var(--fg);
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", sans-serif;}
  .wrap{max-width:980px; margin:0 auto; padding:16px;}

  /* Top bar (simple) */
  .top{
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    padding:10px 0 12px; border-bottom:1px solid var(--line);
  }
  .title{font-weight:900; font-size:14px; letter-spacing:.02em;}
  .right{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .mini{color:var(--muted); font-size:12px;}
  select, button{
    font-size:12px; border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 10px;
  }
  button{cursor:pointer;}
  button:active{transform:translateY(1px);}

  /* Stars (row completion) */
  .stars{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .star{font-size:16px; color:#cfcfcf; user-select:none;}
  .star.done{color:var(--gold);}

  /* Prompt area */
  .prompt{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:18px 0 10px; gap:8px;
  }
  .rowname{font-size:12px; color:var(--muted); user-select:none;}
  .kana{font-size:120px; font-weight:900; line-height:1; user-select:none;}
  .seq{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size:18px; letter-spacing:.10em; user-select:none; min-height:22px;
  }
  .seq .done{color:var(--ok); font-weight:900;}
  .seq .r{color:var(--red); font-weight:900;}
  .seq .b{color:var(--blue); font-weight:900;}

  /* Keyboard */
  .kbdArea{display:flex; flex-direction:column; align-items:center; gap:10px; padding:10px 0;}
  .kbd{display:flex; flex-direction:column; gap:10px; align-items:center;}
  .row{display:flex; gap:10px; justify-content:center;}
  .key{
    width:46px; height:46px; border:1px solid var(--line); border-bottom-width:2px;
    border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-weight:900; background:#fafafa; user-select:none; position:relative;
  }
  .key.small{width:42px;}
  .key.wide{width:96px;}
  .key .sub{
    position:absolute; bottom:6px; right:8px; font-size:10px; color:#b5b5b5; font-weight:800;
  }
  .key.red{background:rgba(176,0,32,.12); border-color:rgba(176,0,32,.35);}
  .key.blue{background:rgba(19,87,214,.12); border-color:rgba(19,87,214,.35);}

  /* Finger guide */
  .fingerBox{
    width:min(760px, 96%);
    border:1px solid var(--line); border-radius:14px; padding:10px 12px;
    display:flex; gap:10px; justify-content:space-between; align-items:center; flex-wrap:wrap;
  }
  .fingerItem{font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:center;}
  .tag{
    display:inline-flex; align-items:center; justify-content:center;
    width:18px; height:18px; border-radius:6px; font-size:11px; font-weight:900;
    border:1px solid var(--line);
  }
  .tag.red{background:rgba(176,0,32,.12); border-color:rgba(176,0,32,.35); color:var(--red);}
  .tag.blue{background:rgba(19,87,214,.12); border-color:rgba(19,87,214,.35); color:var(--blue);}
  .fingerMain{color:var(--fg); font-weight:800;}
  .hint{font-size:12px; color:var(--muted); user-select:none;}

  /* Finish overlay */
  .finish{
    display:none;
    position:fixed; inset:0; background:rgba(255,255,255,.92);
    align-items:center; justify-content:center; flex-direction:column; gap:10px;
    z-index:10;
  }
  .finish.show{display:flex;}
  .finish .big{font-size:90px; color:var(--gold);}
  .finish .txt{font-size:14px; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="title">五十音 ローマ字タイピング</div>
    <div class="right">
      <div class="stars" id="stars"></div>
      <select id="courseSel" aria-label="コース">
        <option value="basic" selected>基本（あ〜わ）</option>
        <option value="basic_dakuten">基本＋濁点/半濁点</option>
        <option value="all">全部（基本＋濁点＋拗音＋促音）</option>
      </select>
      <button id="soundBtn" type="button">おと：ON</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div class="prompt">
    <div class="rowname" id="rowName">Enterでスタート</div>
    <div class="kana" id="kana">▶</div>
    <div class="seq" id="seq"> </div>
  </div>

  <div class="kbdArea">
    <div class="kbd" aria-label="keyboard">
      <div class="row">
        <div class="key small" data-key="Q">Q<div class="sub">LP</div></div>
        <div class="key small" data-key="W">W<div class="sub">LR</div></div>
        <div class="key small" data-key="E">E<div class="sub">LM</div></div>
        <div class="key small" data-key="R">R<div class="sub">LI</div></div>
        <div class="key small" data-key="T">T<div class="sub">LI</div></div>
        <div class="key small" data-key="Y">Y<div class="sub">RI</div></div>
        <div class="key small" data-key="U">U<div class="sub">RI</div></div>
        <div class="key small" data-key="I">I<div class="sub">RM</div></div>
        <div class="key small" data-key="O">O<div class="sub">RR</div></div>
        <div class="key small" data-key="P">P<div class="sub">RP</div></div>
      </div>
      <div class="row">
        <div class="key small" data-key="A">A<div class="sub">LP</div></div>
        <div class="key small" data-key="S">S<div class="sub">LR</div></div>
        <div class="key small" data-key="D">D<div class="sub">LM</div></div>
        <div class="key small" data-key="F">F<div class="sub">LI</div></div>
        <div class="key small" data-key="G">G<div class="sub">LI</div></div>
        <div class="key small" data-key="H">H<div class="sub">RI</div></div>
        <div class="key small" data-key="J">J<div class="sub">RI</div></div>
        <div class="key small" data-key="K">K<div class="sub">RM</div></div>
        <div class="key small" data-key="L">L<div class="sub">RR</div></div>
      </div>
      <div class="row">
        <div class="key small" data-key="Z">Z<div class="sub">LP</div></div>
        <div class="key small" data-key="X">X<div class="sub">LR</div></div>
        <div class="key small" data-key="C">C<div class="sub">LM</div></div>
        <div class="key small" data-key="V">V<div class="sub">LI</div></div>
        <div class="key small" data-key="B">B<div class="sub">LI</div></div>
        <div class="key small" data-key="N">N<div class="sub">RI</div></div>
        <div class="key small" data-key="M">M<div class="sub">RI</div></div>
        <div class="key wide" data-key=" ">SPACE<div class="sub">TH</div></div>
      </div>
    </div>

    <div class="fingerBox">
      <div class="fingerItem">
        <span class="tag red">1</span>
        <span class="fingerMain" id="finger1">-</span>
      </div>
      <div class="fingerItem">
        <span class="tag blue">2</span>
        <span class="fingerMain" id="finger2">-</span>
      </div>
      <div class="hint" id="hint">Enter：スタート（入力欄なし）</div>
    </div>
  </div>
</div>

<div class="finish" id="finish">
  <div class="big">★</div>
  <div class="txt">ぜんぶ クリア！ Enterで もういっかい</div>
</div>

<script>
(() => {
  // ========= Sound (WebAudio) =========
let soundOn = true;

const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

  function unlockAudio() {
  ensureAudio();
  // ついでに1回だけ無音に近い短音を鳴らしてロック解除を確実化
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  g.gain.value = 0.00001;
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.01);
}

// Safari対策：最初の操作で必ずアンロック
window.addEventListener("pointerdown", unlockAudio, { once: true });
window.addEventListener("keydown", unlockAudio, { once: true });

  function ensureAudio() {
  if (!audioCtx) audioCtx = new AC();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function beep(freq, ms, gain = 0.03) {
  if (!soundOn) return;
  ensureAudio();
  beepAt(freq, ms / 1000, audioCtx.currentTime, gain);
}

function fanfare() {
  if (!soundOn) return;
  ensureAudio();
  const t = audioCtx.currentTime;

  beepAt(880,  0.09, t + 0.00, 0.035);
  beepAt(988,  0.09, t + 0.12, 0.035);
  beepAt(1175, 0.13, t + 0.24, 0.035);
}

function beepAt(freq, durSec, whenSec, gain = 0.03) {
  if (!soundOn) return;
  ensureAudio();

  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(freq, whenSec);

  g.gain.value = gain;

  osc.connect(g);
  g.connect(audioCtx.destination);

  osc.start(whenSec);
  osc.stop(whenSec + durSec);
} 
 

  // ========= Finger map =========
  // LP=左小指 LR=左薬指 LM=左中指 LI=左人差し指 / RP=右小指 RR=右薬指 RM=右中指 RI=右人差し指 / TH=親指
  const fingerJP = {
    LP:"左手 小指", LR:"左手 薬指", LM:"左手 中指", LI:"左手 人差し指",
    RP:"右手 小指", RR:"右手 薬指", RM:"右手 中指", RI:"右手 人差し指",
    TH:"親指"
  };
  const fingerCodeByKey = {
    Q:"LP", A:"LP", Z:"LP",
    W:"LR", S:"LR", X:"LR",
    E:"LM", D:"LM", C:"LM",
    R:"LI", F:"LI", V:"LI", T:"LI", G:"LI", B:"LI",
    Y:"RI", H:"RI", N:"RI", U:"RI", J:"RI", M:"RI",
    I:"RM", K:"RM",
    O:"RR", L:"RR",
    P:"RP",
    " ":"TH"
  };

  // ========= Kana -> Romaji candidates =========
  // 「教育的に強い改良」：表記は1つにしつつ、入力は複数のローマ字を受け付ける（SI/SHI等）
  // ここでは基本は訓令寄り（SI, TI, TU, HU, SYA等）で表示し、ヘボンも受け付ける。
  function alt(...xs){ return xs.map(s => s.toUpperCase()); }

  const BASIC_ROWS = [
    { name:"あ行", items:[ ["あ", alt("A")], ["い", alt("I")], ["う", alt("U")], ["え", alt("E")], ["お", alt("O")] ] },
    { name:"か行", items:[ ["か", alt("KA")], ["き", alt("KI")], ["く", alt("KU")], ["け", alt("KE")], ["こ", alt("KO")] ] },
    { name:"さ行", items:[ ["さ", alt("SA")], ["し", alt("SI","SHI")], ["す", alt("SU")], ["せ", alt("SE")], ["そ", alt("SO")] ] },
    { name:"た行", items:[ ["た", alt("TA")], ["ち", alt("TI","CHI")], ["つ", alt("TU","TSU")], ["て", alt("TE")], ["と", alt("TO")] ] },
    { name:"な行", items:[ ["な", alt("NA")], ["に", alt("NI")], ["ぬ", alt("NU")], ["ね", alt("NE")], ["の", alt("NO")] ] },
    { name:"は行", items:[ ["は", alt("HA")], ["ひ", alt("HI")], ["ふ", alt("HU","FU")], ["へ", alt("HE")], ["ほ", alt("HO")] ] },
    { name:"ま行", items:[ ["ま", alt("MA")], ["み", alt("MI")], ["む", alt("MU")], ["め", alt("ME")], ["も", alt("MO")] ] },
    { name:"や行", items:[ ["や", alt("YA")], ["ゆ", alt("YU")], ["よ", alt("YO")] ] },
    { name:"ら行", items:[ ["ら", alt("RA")], ["り", alt("RI")], ["る", alt("RU")], ["れ", alt("RE")], ["ろ", alt("RO")] ] },
    { name:"わ行", items:[ ["わ", alt("WA")], ["を", alt("WO","O")], ["ん", alt("N")] ] },
  ];

  const DAKUTEN_ROWS = [
    { name:"が行", items:[ ["が", alt("GA")], ["ぎ", alt("GI")], ["ぐ", alt("GU")], ["げ", alt("GE")], ["ご", alt("GO")] ] },
    { name:"ざ行", items:[ ["ざ", alt("ZA")], ["じ", alt("ZI","JI")], ["ず", alt("ZU")], ["ぜ", alt("ZE")], ["ぞ", alt("ZO")] ] },
    { name:"だ行", items:[ ["だ", alt("DA")], ["ぢ", alt("DI","JI")], ["づ", alt("DU","ZU")], ["で", alt("DE")], ["ど", alt("DO")] ] },
    { name:"ば行", items:[ ["ば", alt("BA")], ["び", alt("BI")], ["ぶ", alt("BU")], ["べ", alt("BE")], ["ぼ", alt("BO")] ] },
    { name:"ぱ行", items:[ ["ぱ", alt("PA")], ["ぴ", alt("PI")], ["ぷ", alt("PU")], ["ぺ", alt("PE")], ["ぽ", alt("PO")] ] },
  ];

  const YOON_ROW = {
    name:"拗音（きゃ等）",
    items:[
      ["きゃ", alt("KYA")], ["きゅ", alt("KYU")], ["きょ", alt("KYO")],
      ["しゃ", alt("SYA","SHA")], ["しゅ", alt("SYU","SHU")], ["しょ", alt("SYO","SHO")],
      ["ちゃ", alt("TYA","CHA")], ["ちゅ", alt("TYU","CHU")], ["ちょ", alt("TYO","CHO")],
      ["にゃ", alt("NYA")], ["にゅ", alt("NYU")], ["にょ", alt("NYO")],
      ["ひゃ", alt("HYA")], ["ひゅ", alt("HYU")], ["ひょ", alt("HYO")],
      ["みゃ", alt("MYA")], ["みゅ", alt("MYU")], ["みょ", alt("MYO")],
      ["りゃ", alt("RYA")], ["りゅ", alt("RYU")], ["りょ", alt("RYO")],
      ["ぎゃ", alt("GYA")], ["ぎゅ", alt("GYU")], ["ぎょ", alt("GYO")],
      ["じゃ", alt("ZYA","JA")], ["じゅ", alt("ZYU","JU")], ["じょ", alt("ZYO","JO")],
      ["びゃ", alt("BYA")], ["びゅ", alt("BYU")], ["びょ", alt("BYO")],
      ["ぴゃ", alt("PYA")], ["ぴゅ", alt("PYU")], ["ぴょ", alt("PYO")],
    ]
  };

  // 促音：基本的に「次の子音を重ねる」(KKA, SSO...) を出題（小さい「っ」そのものは入力しない）
  // ここは見た目の分かりやすさ優先で、代表だけ。
  const SOKUON_ROW = {
    name:"促音（っ）",
    items:[
      ["っか", alt("KKA")], ["っさ", alt("SSA")], ["った", alt("TTA")], ["っぱ", alt("PPA")],
      ["っき", alt("KKI")], ["っし", alt("SSI","SSHI")], ["っち", alt("TTI","CCHI")], ["っつ", alt("TTU","TTsu".toUpperCase())],
      ["っく", alt("KKU")], ["っす", alt("SSU")], ["って", alt("TTE")], ["っぷ", alt("PPU")],
    ]
  };

  function buildCourse(mode){
    if (mode === "basic") return [...BASIC_ROWS];
    if (mode === "basic_dakuten") return [...BASIC_ROWS, ...DAKUTEN_ROWS];
    return [...BASIC_ROWS, ...DAKUTEN_ROWS, YOON_ROW, SOKUON_ROW];
  }

  // ========= DOM =========
  const $kana = document.getElementById("kana");
  const $seq  = document.getElementById("seq");
  const $rowName = document.getElementById("rowName");
  const $stars = document.getElementById("stars");
  const $finger1 = document.getElementById("finger1");
  const $finger2 = document.getElementById("finger2");
  const $hint = document.getElementById("hint");
  const $finish = document.getElementById("finish");

  const $soundBtn = document.getElementById("soundBtn");
  const $resetBtn = document.getElementById("resetBtn");
  const $courseSel = document.getElementById("courseSel");

  const keyEls = new Map();
  document.querySelectorAll(".key").forEach(el => keyEls.set(el.getAttribute("data-key"), el));

  // ========= Game state =========
  let running = false;

  let courseMode = $courseSel.value;
  let course = buildCourse(courseMode);

  let rowIdx = 0;
  let itemIdx = 0;

  // typed buffer for current kana
  let typed = "";
  // candidates remaining for current kana, and active display sequence
  let candidates = [];
  let activeSeq = "";

  function resetStars(){
    $stars.innerHTML = "";
    for (let i=0;i<course.length;i++){
      const s = document.createElement("span");
      s.className = "star";
      s.textContent = "★";
      $stars.appendChild(s);
    }
  }

  function clearKeyHL(){
    keyEls.forEach(el => el.classList.remove("red","blue"));
  }

  function renderSeq(){
    if (!activeSeq){
      $seq.textContent = " ";
      return;
    }
    const chars = activeSeq.split("");
    const out = chars.map((ch,i) => {
      if (i < typed.length) return `<span class="done">${ch}</span>`;
      if (i === typed.length) return `<span class="r">${ch}</span>`;
      if (i === typed.length + 1) return `<span class="b">${ch}</span>`;
      return ch;
    }).join("");
    $seq.innerHTML = out;
  }

  function updateFingerGuide(){
    const k1 = activeSeq[typed.length] || "";
    const k2 = activeSeq[typed.length+1] || "";
    const f1 = fingerCodeByKey[k1] || "";
    const f2 = fingerCodeByKey[k2] || "";
    $finger1.textContent = k1 ? `${k1}：${fingerJP[f1] || "-"}` : "-";
    $finger2.textContent = k2 ? `${k2}：${fingerJP[f2] || "-"}` : "-";
  }

  function updateKeyHL(){
    clearKeyHL();
    const k1 = activeSeq[typed.length] || "";
    const k2 = activeSeq[typed.length+1] || "";
    if (k1 && keyEls.get(k1)) keyEls.get(k1).classList.add("red");
    if (k2 && keyEls.get(k2)) keyEls.get(k2).classList.add("blue");
  }

  function setPrompt(kana, rowName){
    $kana.textContent = kana;
    $rowName.textContent = rowName;
  }

  function pickCurrent(){
    const row = course[rowIdx];
    const [kana, romas] = row.items[itemIdx];
    return { row, kana, romas };
  }

  function startItem(){
    const { row, kana, romas } = pickCurrent();
    typed = "";
    candidates = romas.slice(); // list of strings
    activeSeq = candidates[0] || "";
    setPrompt(kana, row.name);
    renderSeq();
    updateKeyHL();
    updateFingerGuide();
  }

  function markRowDone(i){
    const s = $stars.children[i];
    if (s) s.classList.add("done");
  }

  function showFinish(){
    running = false;
    clearKeyHL();
    $finish.classList.add("show");
    $kana.textContent = "★";
    $seq.textContent = " ";
    $rowName.textContent = "クリア！";
    fanfare();
    setTimeout(()=>fanfare(), 500);
  }

  function hideFinish(){
    $finish.classList.remove("show");
  }

  function nextItemOrRow(){
    // advance item
    itemIdx++;
    if (itemIdx < course[rowIdx].items.length){
      startItem();
      return;
    }
    // row completed
    markRowDone(rowIdx);
    fanfare();

    rowIdx++;
    itemIdx = 0;

    if (rowIdx >= course.length){
      showFinish();
      return;
    }
    startItem();
  }

  function startGame(){
    hideFinish();
    courseMode = $courseSel.value;
    course = buildCourse(courseMode);
    rowIdx = 0;
    itemIdx = 0;
    running = true;
    resetStars();
    startItem();
    $hint.textContent = "Enter：リスタート / Esc：やりなおし";
  }

  function resetAll(){
    running = false;
    hideFinish();
    typed = "";
    candidates = [];
    activeSeq = "";
    rowIdx = 0; itemIdx = 0;

    courseMode = $courseSel.value;
    course = buildCourse(courseMode);
    resetStars();

    clearKeyHL();
    $kana.textContent = "▶";
    $seq.textContent = " ";
    $rowName.textContent = "Enterでスタート";
    $finger1.textContent = "-";
    $finger2.textContent = "-";
    $hint.textContent = "Enter：スタート（入力欄なし）";
  }

  // ========= Input handling (no textbox) =========
  function handleKeyDown(e){
    const k = e.key;

    // Enter starts / restarts
    if (k === "Enter"){
      if (!running || $finish.classList.contains("show")) startGame();
      return;
    }
    // Esc resets
    if (k === "Escape"){
      resetAll();
      return;
    }

    if (!running) return;

    // accept only A-Z
    if (k.length !== 1) return;
    const pressed = k.toUpperCase();
    if (!/^[A-Z]$/.test(pressed)) return;

    // filter candidates by prefix match if we append this key
    const nextTyped = typed + pressed;
    const filtered = candidates.filter(s => s.startsWith(nextTyped));

    if (filtered.length === 0){
      // miss
      beep(220, 70);
      return;
    }

    // correct (at least one candidate remains)
    beep(660, 55);
    typed = nextTyped;
    candidates = filtered;

    // choose active sequence:
    // - prefer the shortest remaining candidate (less keystrokes)
    // - if tied, keep current if still possible
    const currentStill = candidates.includes(activeSeq);
    if (!currentStill){
      let best = candidates[0];
      for (const s of candidates){
        if (s.length < best.length) best = s;
      }
      activeSeq = best;
    } else {
      // keep activeSeq, but if there's strictly shorter, switch to it (helps with "O/WO" etc)
      let best = activeSeq;
      for (const s of candidates){
        if (s.length < best.length) best = s;
      }
      activeSeq = best;
    }

    // completed?
    if (typed.length >= activeSeq.length){
      nextItemOrRow();
      return;
    }

    // update UI
    renderSeq();
    updateKeyHL();
    updateFingerGuide();
  }

  // ========= Buttons / controls =========
  $soundBtn.addEventListener("click", () => {
    soundOn = !soundOn;
    $soundBtn.textContent = "おと：" + (soundOn ? "ON" : "OFF");
    if (soundOn) beep(440, 60);
  });
  $resetBtn.addEventListener("click", resetAll);
  $courseSel.addEventListener("change", resetAll);

  window.addEventListener("keydown", (e) => {
    // prevent space scroll if someone hits it
    if (e.key === " ") e.preventDefault();
    handleKeyDown(e);
  }, { passive:false });

  // init
  resetAll();
})();
