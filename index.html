<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>sound</title>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-size:40px;
  font-family:sans-serif;
}
</style>
</head>

<body>

Press Enter

<script>

const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    audio.currentTime = 0;
    audio.play();
  }
});

</script>

</body>
</html>
