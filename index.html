<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>タイピング練習</title>
  <style>
    :root{
      --fg:#111;
      --muted:#666;
      --ok:#0a7;
      --ng:#d22;
      --line:#e8e8e8;
      --bg:#fff;
    }
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing: .2px;
    }
    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 40px;
      display:flex;
      flex-direction:column;
      gap:18px;
      min-height:100%;
      box-sizing:border-box;
    }
    header{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    header h1{
      margin:0;
      font-size:16px;
      font-weight:700;
    }
    .meta{
      display:flex;
      gap:14px;
      align-items:baseline;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .meta b{color:var(--fg); font-weight:700;}
    .card{
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 16px;
    }
    .center{
      text-align:center;
    }
    .stationJP{
      font-size:52px;
      font-weight:800;
      line-height:1.08;
      margin:6px 0 10px;
    }
    .stationRoma{
      font-size:18px;
      color:var(--muted);
      margin:0;
      letter-spacing:.6px;
    }
    .progress{
      margin-top:14px;
      font-size:22px;
      line-height:1.55;
      word-break:break-word;
      letter-spacing:.35px;
      user-select:none;
    }
    .progress .ok{color:var(--ok)}
    .progress .ng{color:var(--ng)}
    .progress .rest{color:var(--fg)}
    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-top:10px;
      flex-wrap:wrap;
    }
    button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--fg);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      cursor:pointer;
    }
    button:active{transform:translateY(1px)}
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
      border:1px solid var(--line);
      border-bottom-width:2px;
      padding:2px 6px;
      border-radius:8px;
      color:var(--fg);
      background:#fff;
    }

    /* Countdown overlay */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.92);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:10;
    }
    .overlay.show{display:flex}
    .count{
      text-align:center;
    }
    .count .big{
      font-size:84px;
      font-weight:900;
      line-height:1;
      margin:0;
    }
    .count .sub{
      margin:12px 0 0;
      font-size:12px;
      color:var(--muted);
    }
    footer{
      margin-top:auto;
      padding-top:14px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>タイピング練習</h1>
      <div class="meta">
        <span>駅: <b id="statIndex">1</b>/<span id="statTotal">30</span></span>
        <span>正確率: <b id="statAcc">100</b>%</span>
        <span>WPM: <b id="statWpm">0</b></span>
        <span>ミス: <b id="statMiss">0</b></span>
      </div>
    </header>

    <section class="card center">
      <div class="stationJP" id="jp">東京</div>
      <p class="stationRoma" id="roma">tokyo</p>

      <div class="progress" id="progress" aria-label="typing progress"></div>

      <div class="hint" id="stateHint">
        <span class="kbd">Enter</span> で開始
      </div>

      <div class="actions">
        <button id="btnSkip" type="button">次へ</button>
        <button id="btnReset" type="button">リセット</button>
      </div>
    </section>

    <footer>
      入力欄なし（キーボード入力のみ）
    </footer>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="countdown">
    <div class="count">
      <p class="big" id="countText">3</p>
      <p class="sub">開始前は入力を受け付けません</p>
    </div>
  </div>

  <script>
    // 山手線（30駅）
    const STATIONS = [
      { jp:"東京", roma:["tokyo","toukyou","tookyoo","toukyo"] },
      { jp:"有楽町", roma:["yurakucho","yuurakucho","yurakutyo","yuurakutyo","yurakutyou","yuurakutyou"] },
      { jp:"新橋", roma:["shimbashi","shinbashi","sinbasi"] },
      { jp:"浜松町", roma:["hamamatsucho","hamamatsutyo","hamamatucho","hamamatutyo"] },
      { jp:"田町", roma:["tamachi"] },
      { jp:"高輪ゲートウェイ", roma:["takanawa gateway","takanawa-gateway","takanawagateway"] },
      { jp:"品川", roma:["shinagawa","sinagawa"] },
      { jp:"大崎", roma:["osaki","oosaki"] },
      { jp:"五反田", roma:["gotanda"] },
      { jp:"目黒", roma:["meguro"] },
      { jp:"恵比寿", roma:["ebisu"] },
      { jp:"渋谷", roma:["shibuya","sibuya"] },
      { jp:"原宿", roma:["harajuku"] },
      { jp:"代々木", roma:["yoyogi","yoyogi"] },
      { jp:"新宿", roma:["shinjuku","sinzyuku","sinjuku"] },
      { jp:"新大久保", roma:["shinokubo","shin-ookubo","shinookubo","shinokubo","shinokubo","shinookubo"] },
      { jp:"高田馬場", roma:["takadanobaba","takadanobaba"] },
      { jp:"目白", roma:["mejiro"] },
      { jp:"池袋", roma:["ikebukuro"] },
      { jp:"大塚", roma:["otsuka","ootsuka"] },
      { jp:"巣鴨", roma:["sugamo"] },
      { jp:"駒込", roma:["komagome"] },
      { jp:"田端", roma:["tabata"] },
      { jp:"西日暮里", roma:["nishinippori","nishi-nippori"] },
      { jp:"日暮里", roma:["nippori"] },
      { jp:"鶯谷", roma:["uguisudani"] },
      { jp:"上野", roma:["ueno"] },
      { jp:"御徒町", roma:["okachimachi","okamaty","okatimati","okatyomachi"] },
      { jp:"秋葉原", roma:["akihabara"] },
      { jp:"神田", roma:["kanda"] },
    ];

    // ---- State ----
    let order = [];
    let idx = 0;

    let accepting = false;     // 入力受付中
    let startedAt = null;      // 計測開始（Goの瞬間）
    let totalTyped = 0;        // 打鍵数（正誤含む）
    let totalMiss = 0;         // ミス数

    let target = "";           // 正規化後の出題文字列（表示用はromaPrimary）
    let candidates = [];       // 正規化済み候補
    let typed = "";            // 正規化済み入力
    let lastWasMistake = false;

    // ---- DOM ----
    const elJp = document.getElementById("jp");
    const elRoma = document.getElementById("roma");
    const elProg = document.getElementById("progress");
    const elHint = document.getElementById("stateHint");

    const elIdx = document.getElementById("statIndex");
    const elTotal = document.getElementById("statTotal");
    const elAcc = document.getElementById("statAcc");
    const elWpm = document.getElementById("statWpm");
    const elMiss = document.getElementById("statMiss");

    const overlay = document.getElementById("overlay");
    const countText = document.getElementById("countText");

    document.getElementById("btnSkip").addEventListener("click", () => {
      if (!accepting) {
        // 開始前でも出題だけ進める
        nextStation();
        return;
      }
      nextStation();
    });

    document.getElementById("btnReset").addEventListener("click", resetAll);

    // ---- Helpers ----
    function shuffle(a){
      for (let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function normalizeRoma(s){
      // 1) lower
      // 2) remove spaces/hyphens/underscores/apostrophes/dots
      // 3) convert full-width alnum to half-width
      const fwToHw = (ch) => {
        const code = ch.charCodeAt(0);
        // Full-width 0-9 A-Z a-z
        if (code >= 0xFF10 && code <= 0xFF19) return String.fromCharCode(code - 0xFF10 + 0x30);
        if (code >= 0xFF21 && code <= 0xFF3A) return String.fromCharCode(code - 0xFF21 + 0x41);
        if (code >= 0xFF41 && code <= 0xFF5A) return String.fromCharCode(code - 0xFF41 + 0x61);
        return ch;
      };
      return Array.from(String(s))
        .map(fwToHw)
        .join("")
        .toLowerCase()
        .replace(/[\s\-_'.]/g,"");
    }

    function nowMs(){ return performance.now(); }

    function calcAcc(){
      if (totalTyped === 0) return 100;
      const ok = totalTyped - totalMiss;
      return Math.max(0, Math.round((ok / totalTyped) * 100));
    }

    function calcWpm(){
      if (!startedAt) return 0;
      const minutes = (nowMs() - startedAt) / 60000;
      if (minutes <= 0) return 0;
      // WPM = (characters typed / 5) / minutes
      return Math.max(0, Math.round((totalTyped / 5) / minutes));
    }

    function updateStats(){
      elIdx.textContent = String(Math.min(idx+1, order.length));
      elTotal.textContent = String(order.length);
      elAcc.textContent = String(calcAcc());
      elWpm.textContent = String(calcWpm());
      elMiss.textContent = String(totalMiss);
    }

    function renderProgress(){
      const t = target;
      const p = typed;

      // 共通接頭辞（正しく一致している部分）を求める：候補のどれかに一致している前提で、typedがprefixかどうかを見る
      // ただしtypedが候補のprefixでない場合は最後入力ミス扱い（赤）
      const okLen = (() => {
        // 候補の中で typed が prefix になっているものがあるなら typed 全部OKとして表示
        const isPrefixSome = candidates.some(c => c.startsWith(p));
        if (isPrefixSome) return p.length;
        // prefixでない場合：直前までの prefix を最大化
        let best = 0;
        for (const c of candidates){
          const m = Math.min(c.length, p.length);
          let k = 0;
          while (k < m && c[k] === p[k]) k++;
          if (k > best) best = k;
        }
        return best;
      })();

      const ok = t.slice(0, okLen);
      const rest = t.slice(okLen);

      // ミス表示（typedがprefixでないとき、直近の1文字を赤に）
      let ng = "";
      let okShown = ok;
      let restShown = rest;

      const isPrefixSome = candidates.some(c => c.startsWith(p));
      if (!isPrefixSome && p.length > 0){
        // 赤は「okLenの次の1文字」相当（ユーザーが打った分を反映したいので、typed側のその文字）
        ng = p.slice(okLen, okLen + 1);
        // 残りは target をそのまま（視認優先）
      }

      elProg.innerHTML =
        `<span class="ok">${escapeHtml(okShown)}</span>` +
        (ng ? `<span class="ng">${escapeHtml(ng)}</span>` : ``) +
        `<span class="rest">${escapeHtml(restShown)}</span>`;

      updateStats();
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setStation(st){
      elJp.textContent = st.jp;

      // 表示は「代表」を1つ（最初の候補）にして、入力は候補全部OKにする
      const primary = st.roma[0];
      elRoma.textContent = primary;

      candidates = st.roma.map(normalizeRoma);

      // targetはprimaryを正規化したものを描画に使う（見た目はprimaryそのまま）
      target = normalizeRoma(primary);

      typed = "";
      lastWasMistake = false;
      renderProgress();
    }

    function nextStation(){
      idx++;
      if (idx >= order.length){
        // 周回
        idx = 0;
        order = shuffle(order);
      }
      setStation(order[idx]);
      updateStats();
    }

    function resetAll(){
      order = shuffle([...STATIONS]);
      idx = 0;

      accepting = false;
      startedAt = null;
      totalTyped = 0;
      totalMiss = 0;

      setStation(order[idx]);
      elHint.innerHTML = `<span class="kbd">Enter</span> で開始`;
      updateStats();
    }

    // ---- Countdown ----
    async function startCountdown(){
      accepting = false;
      overlay.classList.add("show");
      const seq = ["3","2","1","Go"];
      for (let i=0;i<seq.length;i++){
        countText.textContent = seq[i];
        // "Go" は少し短く
        await sleep(i === seq.length-1 ? 450 : 650);
      }
      overlay.classList.remove("show");

      // 開始
      accepting = true;
      startedAt = nowMs();
      totalTyped = 0;
      totalMiss = 0;
      typed = "";
      lastWasMistake = false;

      elHint.textContent = "";
      renderProgress();
    }

    function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

    // ---- Input handling ----
    function isPrintableKey(e){
      if (e.ctrlKey || e.metaKey || e.altKey) return false;
      if (e.key.length !== 1) return false;
      // allow basic ascii letters/numbers; others are ignored
      return /[a-zA-Z0-9\-'\. _]/.test(e.key);
    }

    function handleChar(ch){
      const key = normalizeRoma(ch);
      if (!key) return;

      // 1文字だけ追加（正規化で記号が落ちる場合は空になる）
      if (key.length !== 1) return;

      typed += key;
      totalTyped += 1;

      const isPrefixSome = candidates.some(c => c.startsWith(typed));
      if (!isPrefixSome){
        totalMiss += 1;
        lastWasMistake = true;
      }else{
        lastWasMistake = false;
      }

      // 完了判定：typed が候補のどれかと完全一致
      const matched = candidates.find(c => c === typed);
      renderProgress();

      if (matched){
        // 次へ（少しだけ間を空ける）
        accepting = false;
        setTimeout(() => {
          accepting = true;
          nextStation();
        }, 180);
      }
    }

    function handleBackspace(){
      if (typed.length === 0) return;
      typed = typed.slice(0, -1);
      // 打鍵数としてはカウントしない（一般的にBackspaceは別扱い）
      lastWasMistake = false;
      renderProgress();
    }

    window.addEventListener("keydown", (e) => {
      // 開始前：Enterのみ受付（カウントダウン起動）
      if (!accepting){
        if (e.key === "Enter"){
          e.preventDefault();
          startCountdown();
        }
        return;
      }

      // 開始後
      if (e.key === "Enter"){
        // Enterは無効（誤入力防止）
        e.preventDefault();
        return;
      }

      if (e.key === "Backspace"){
        e.preventDefault();
        handleBackspace();
        return;
      }

      if (isPrintableKey(e)){
        e.preventDefault();
        handleChar(e.key);
      }
    }, { passive:false });

    // ---- Init ----
    resetAll();
  </script>
</body>
</html>
