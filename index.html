<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>おとタイピング</title>
<style>
body{
font-family:sans-serif;
text-align:center;
margin-top:120px;
font-size:90px;
}
button{
font-size:30px;
margin-top:40px;
}
</style>
</head>

<body>

<div id="kana">START</div>
<button onclick="start()">START</button>

<audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="ng" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>

const words=[
["あ","a"],
["い","i"],
["う","u"],
["え","e"],
["お","o"],
["か","ka"],
["き","ki"],
["く","ku"],
["け","ke"],
["こ","ko"]
]

let index=0
let pos=0
let started=false

function start(){
started=true
document.getElementById("kana").textContent=words[index][0]
}

function next(){
index++
if(index>=words.length)index=0
pos=0
document.getElementById("kana").textContent=words[index][0]
}

document.addEventListener("keydown",e=>{

if(!started)return

let target=words[index][1]

if(e.key===target[pos]){

document.getElementById("ok").currentTime=0
document.getElementById("ok").play()

pos++

if(pos>=target.length){
next()
}

}else{

document.getElementById("ng").currentTime=0
document.getElementById("ng").play()

}

})

</script>

</body>
</html>
