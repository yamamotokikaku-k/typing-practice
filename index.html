<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Typing Practice</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#f6f7fb;
      --panel2:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#d7dbe6;

      --key:#ffffff;
      --keyText:#0f172a;
      --hit:#111827;

      --thumb:#dbeafe;
      --index:#dcfce7;
      --middle:#fef9c3;
      --ring:#ffe4e6;
      --pinky:#f3e8ff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    }
    header{
      padding:16px 16px 10px;
      border-bottom:1px solid var(--line);
      background:var(--panel2);
      position:sticky; top:0; z-index:10;
    }
    h1{ margin:0; font-size:18px; }
    .hint{ color:var(--muted); font-size:12px; margin-top:6px; }
    main{
      display:grid;
      gap:12px;
      padding:12px;
      max-width:980px;
      margin:0 auto;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
    }
    .label{ color:var(--muted); font-size:12px; margin-bottom:8px; }
    textarea{
      width:100%;
      min-height:96px;
      border-radius:10px;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      padding:10px;
      font-size:18px;
      line-height:1.4;
      outline:none;
      resize:vertical;
    }
    .row{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
    button, select{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      font-size:14px;
    }
    button{ cursor:pointer; }
    .meta{
      margin-top:10px;
      display:flex;
      gap:12px;
      color:var(--muted);
      font-size:12px;
      flex-wrap:wrap;
    }
    .kbd{
      width:100%;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:6px;
      touch-action:manipulation;
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
    }
    .kbd svg{ width:860px; height:auto; display:block; }
    .key{ fill:var(--key); stroke:var(--line); stroke-width:1; }
    .keyText{
      fill:var(--keyText);
      font-size:12px;
      text-anchor:middle;
      dominant-baseline:middle;
      pointer-events:none;
      user-select:none;
    }
    .finger-L_THUMB,.finger-R_THUMB{ fill: color-mix(in srgb, var(--thumb) 75%, var(--key)); }
    .finger-L_INDEX,.finger-R_INDEX{ fill: color-mix(in srgb, var(--index) 75%, var(--key)); }
    .finger-L_MIDDLE,.finger-R_MIDDLE{ fill: color-mix(in srgb, var(--middle) 75%, var(--key)); }
    .finger-L_RING,.finger-R_RING{ fill: color-mix(in srgb, var(--ring) 75%, var(--key)); }
    .finger-L_PINKY,.finger-R_PINKY{ fill: color-mix(in srgb, var(--pinky) 75%, var(--key)); }
    .hit{
      stroke:var(--hit);
      stroke-width:2.4;
      filter: drop-shadow(0 0 6px rgba(17,24,39,0.20));
    }
    .links .q{ color:var(--muted); font-size:12px; margin-bottom:8px; }
    ul{ list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    a{
      color:var(--text);
      text-decoration:none;
      border:1px solid var(--line);
      background:var(--panel2);
      padding:10px;
      border-radius:10px;
      display:block;
    }
    a span{ color:var(--muted); font-size:12px; display:block; margin-top:2px; }

    .prompt{
      border:1px solid var(--line);
      background:var(--panel2);
      border-radius:12px;
      padding:12px;
    }
    .promptTitle{ color:var(--muted); font-size:12px; margin-bottom:6px; }
    .promptWord{ font-size:26px; letter-spacing:0.2px; }
    .promptRoma{ color:var(--muted); font-size:12px; margin-top:6px; }

    .scoreGrid{
      display:grid;
      gap:10px;
      grid-template-columns: 1fr 1fr;
    }
    .card{
      border:1px solid var(--line);
      background:var(--panel2);
      border-radius:12px;
      padding:12px;
    }
    .cardTitle{ color:var(--muted); font-size:12px; margin-bottom:6px; }
    .cardValue{ font-size:20px; }

    .badge{
      display:inline-block;
      border:1px solid var(--line);
      background:var(--panel2);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Typing Practice</h1>
    <div id="deviceHint" class="hint"></div>
  </header>

  <main>
    <section class="panel">
      <div class="label">Mode</div>
      <div class="row">
        <select id="modeSelect">
          <option value="free">Free（自由入力）</option>
          <option value="yamanote_inner">山手線：内回り（駅名→ローマ字）</option>
          <option value="yamanote_outer">山手線：外回り（駅名→ローマ字）</option>
        </select>
        <button id="restartBtn" type="button" title="山手線モードを最初から">Restart</button>
        <span id="progressBadge" class="badge">Free</span>
      </div>

      <div id="trainingBox" class="prompt" style="display:none; margin-top:10px;">
        <div class="promptTitle" id="promptTitle">出題</div>
        <div class="promptWord" id="promptWord">-</div>
        <div class="promptRoma" id="promptRoma">-</div>
      </div>

      <div id="scoreBox" style="display:none; margin-top:10px;">
        <div class="scoreGrid">
          <div class="card">
            <div class="cardTitle">タイム</div>
            <div class="cardValue" id="timeNow">-</div>
          </div>
          <div class="card">
            <div class="cardTitle">ミスタイプ数</div>
            <div class="cardValue" id="mistypeNow">-</div>
          </div>
          <div class="card">
            <div class="cardTitle">BEST タイム</div>
            <div class="cardValue" id="bestTime">-</div>
          </div>
          <div class="card">
            <div class="cardTitle">BEST ミスタイプ数</div>
            <div class="cardValue" id="bestMistype">-</div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="label">入力（ローマ字・変換なし）</div>
      <textarea id="typed" autocapitalize="none" autocomplete="off" spellcheck="false" placeholder="ここにタイプ（iPhone OK）"></textarea>
      <div class="row">
        <button id="clearBtn" type="button">Clear</button>
        <button id="copyBtn" type="button">Copy</button>
      </div>
      <div class="meta">
        <div>Last key: <span id="lastKey">-</span></div>
        <div>Last char: <span id="lastChar">-</span></div>
      </div>
    </section>

    <section class="panel">
      <div class="label">US Keyboard（指の担当）</div>
      <div id="keyboard" class="kbd"></div>
    </section>

    <section class="panel links">
      <div class="label">リンク候補</div>
      <div class="q">Query: <span id="queryText">-</span></div>
      <ul id="linkList"></ul>
    </section>
  </main>

<script>
  const $ = (s)=>document.querySelector(s);

  const typedEl = $("#typed");
  const keyboardHost = $("#keyboard");
  const lastKeyEl = $("#lastKey");
  const lastCharEl = $("#lastChar");

  const queryTextEl = $("#queryText");
  const linkListEl = $("#linkList");

  const deviceHintEl = $("#deviceHint");

  const clearBtn = $("#clearBtn");
  const copyBtn = $("#copyBtn");

  const modeSelect = $("#modeSelect");
  const restartBtn = $("#restartBtn");
  const progressBadge = $("#progressBadge");

  const trainingBox = $("#trainingBox");
  const promptTitle = $("#promptTitle");
  const promptWord = $("#promptWord");
  const promptRoma = $("#promptRoma");

  const scoreBox = $("#scoreBox");
  const timeNowEl = $("#timeNow");
  const mistypeNowEl = $("#mistypeNow");
  const bestTimeEl = $("#bestTime");
  const bestMistypeEl = $("#bestMistype");

  let prevValue = "";

  // --- Roma normalization (allow variations) ---
  // Strategy: normalize both target and input into a canonical form
  // Canonical choices:
  //  shi->si, chi->ti, tsu->tu, fu->hu, ji->zi
  //  sha/shu/sho -> sya/syu/syo
  //  cha/chu/cho -> tya/tyu/tyo
  //  ja/ju/jo -> zya/zyu/zyo
  function normalizeRoma(s){
    return (s || "")
      .toLowerCase()
      .replace(/[^a-z]/g, "")
      // 3 letters -> 2 letters (do these first)
      .replace(/shi/g, "si")
      .replace(/chi/g, "ti")
      .replace(/tsu/g, "tu")
      // yoon (3 letters) -> canonical
      .replace(/sha/g, "sya").replace(/shu/g, "syu").replace(/sho/g, "syo")
      .replace(/cha/g, "tya").replace(/chu/g, "tyu").replace(/cho/g, "tyo")
      .replace(/ja/g,  "zya").replace(/ju/g,  "zyu").replace(/jo/g,  "zyo")
      // 2 letters variations
      .replace(/fu/g, "hu")
      .replace(/ji/g, "zi");
  }

  // --- Finger map (US minimal) ---
  const fingerMap = {
    "SPACE":"THUMBS",
    "ENTER":"R_PINKY","BACKSPACE":"R_PINKY",
    "TAB":"L_PINKY","CAPS":"L_PINKY",
    "SHIFT_L":"L_PINKY","SHIFT_R":"R_PINKY",

    "Q":"L_PINKY","W":"L_RING","E":"L_MIDDLE","R":"L_INDEX","T":"L_INDEX",
    "Y":"R_INDEX","U":"R_INDEX","I":"R_MIDDLE","O":"R_RING","P":"R_PINKY",

    "A":"L_PINKY","S":"L_RING","D":"L_MIDDLE","F":"L_INDEX","G":"L_INDEX",
    "H":"R_INDEX","J":"R_INDEX","K":"R_MIDDLE","L":"R_RING",

    "Z":"L_PINKY","X":"L_RING","C":"L_MIDDLE","V":"L_INDEX","B":"L_INDEX",
    "N":"R_INDEX","M":"R_INDEX",

    "1":"L_PINKY","2":"L_RING","3":"L_MIDDLE","4":"L_INDEX","5":"L_INDEX",
    "6":"R_INDEX","7":"R_INDEX","8":"R_MIDDLE","9":"R_RING","0":"R_PINKY",

    "MINUS":"R_PINKY","EQUAL":"R_PINKY",
    "LBRACKET":"R_PINKY","RBRACKET":"R_PINKY","BACKSLASH":"R_PINKY",
    "SEMICOLON":"R_PINKY","QUOTE":"R_PINKY",
    "COMMA":"R_MIDDLE","DOT":"R_RING","SLASH":"R_PINKY",
    "BACKTICK":"L_PINKY"
  };

  // --- Yamanote data (30 stations) ---
  // roma can be a string OR an array of strings (extra flexibility)
  const yamanote_inner = [
    {jp:"東京", roma:"tokyo"},
    {jp:"有楽町", roma:["yurakucho","yurakutyo"]},
    {jp:"新橋", roma:["shimbashi","simbasi"]},
    {jp:"浜松町", roma:["hamamatsucho","hamamatsutyo"]},
    {jp:"田町", roma:"tamachi"},
    {jp:"高輪ゲートウェイ", roma:["takanawagateway","takanawa gateway"]},
    {jp:"品川", roma:"shinagawa"},
    {jp:"大崎", roma:"osaki"},
    {jp:"五反田", roma:"gotanda"},
    {jp:"目黒", roma:"meguro"},
    {jp:"恵比寿", roma:"ebisu"},
    {jp:"渋谷", roma:"shibuya"},
    {jp:"原宿", roma:["harajuku","harazyuku"]},
    {jp:"代々木", roma:"yoyogi"},
    {jp:"新宿", roma:["shinjuku","sinzyuku","sinjuku"]},
    {jp:"新大久保", roma:["shinokubo","sinokubo"]},
    {jp:"高田馬場", roma:"takadanobaba"},
    {jp:"目白", roma:"mejiro"},
    {jp:"池袋", roma:["ikebukuro","ikebukuro"]},
    {jp:"大塚", roma:["otsuka","ootsuka"]},
    {jp:"巣鴨", roma:["sugamo","sugamo"]},
    {jp:"駒込", roma:["komagome","komagome"]},
    {jp:"田端", roma:["tabata","tabata"]},
    {jp:"西日暮里", roma:["nishinippori","nisinippori"]},
    {jp:"日暮里", roma:["nippori","nippori"]},
    {jp:"鶯谷", roma:["uguisudani","uguisudani"]},
    {jp:"上野", roma:["ueno","ueno"]},
    {jp:"御徒町", roma:["okachimachi","okatimati"]},
    {jp:"秋葉原", roma:["akihabara","akihabara"]},
    {jp:"神田", roma:["kanda","kanda"]}
  ];

  const yamanote_outer = [
    {jp:"東京", roma:"tokyo"},
    {jp:"神田", roma:["kanda","kanda"]},
    {jp:"秋葉原", roma:["akihabara","akihabara"]},
    {jp:"御徒町", roma:["okachimachi","okatimati"]},
    {jp:"上野", roma:["ueno","ueno"]},
    {jp:"鶯谷", roma:["uguisudani","uguisudani"]},
    {jp:"日暮里", roma:["nippori","nippori"]},
    {jp:"西日暮里", roma:["nishinippori","nisinippori"]},
    {jp:"田端", roma:["tabata","tabata"]},
    {jp:"駒込", roma:["komagome","komagome"]},
    {jp:"巣鴨", roma:["sugamo","sugamo"]},
    {jp:"大塚", roma:["otsuka","ootsuka"]},
    {jp:"池袋", roma:["ikebukuro","ikebukuro"]},
    {jp:"目白", roma:"mejiro"},
    {jp:"高田馬場", roma:"takadanobaba"},
    {jp:"新大久保", roma:["shinokubo","sinokubo"]},
    {jp:"新宿", roma:["shinjuku","sinzyuku","sinjuku"]},
    {jp:"代々木", roma:"yoyogi"},
    {jp:"原宿", roma:["harajuku","harazyuku"]},
    {jp:"渋谷", roma:"shibuya"},
    {jp:"恵比寿", roma:"ebisu"},
    {jp:"目黒", roma:"meguro"},
    {jp:"五反田", roma:"gotanda"},
    {jp:"大崎", roma:"osaki"},
    {jp:"品川", roma:"shinagawa"},
    {jp:"高輪ゲートウェイ", roma:["takanawagateway","takanawa gateway"]},
    {jp:"田町", roma:"tamachi"},
    {jp:"浜松町", roma:["hamamatsucho","hamamatsutyo"]},
    {jp:"新橋", roma:["shimbashi","simbasi"]},
    {jp:"有楽町", roma:["yurakucho","yurakutyo"]}
  ];

  const state = {
    mode: "free",
    idx: 0,
    started: false,
    startMs: 0,
    finishMs: 0,
    mistype: 0
  };

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, (c)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function fingerClass(keyId){
    if(keyId === "SPACE") return "finger-L_THUMB finger-R_THUMB";
    const f = fingerMap[keyId];
    return f ? `finger-${f}` : "";
  }

  function renderKeyboard(){
    const rows = [
      [{id:"BACKTICK",label:"`"},{id:"1",label:"1"},{id:"2",label:"2"},{id:"3",label:"3"},{id:"4",label:"4"},
       {id:"5",label:"5"},{id:"6",label:"6"},{id:"7",label:"7"},{id:"8",label:"8"},{id:"9",label:"9"},
       {id:"0",label:"0"},{id:"MINUS",label:"-"},{id:"EQUAL",label:"="},{id:"BACKSPACE",label:"⌫",w:1.6}],
      [{id:"TAB",label:"Tab",w:1.3},{id:"Q",label:"Q"},{id:"W",label:"W"},{id:"E",label:"E"},{id:"R",label:"R"},{id:"T",label:"T"},
       {id:"Y",label:"Y"},{id:"U",label:"U"},{id:"I",label:"I"},{id:"O",label:"O"},{id:"P",label:"P"},
       {id:"LBRACKET",label:"["},{id:"RBRACKET",label:"]"},{id:"BACKSLASH",label:"\\",w:1.3}],
      [{id:"CAPS",label:"Caps",w:1.55},{id:"A",label:"A"},{id:"S",label:"S"},{id:"D",label:"D"},{id:"F",label:"F"},{id:"G",label:"G"},
       {id:"H",label:"H"},{id:"J",label:"J"},{id:"K",label:"K"},{id:"L",label:"L"},
       {id:"SEMICOLON",label:";"},{id:"QUOTE",label:"'"},{id:"ENTER",label:"Enter",w:1.75}],
      [{id:"SHIFT_L",label:"Shift",w:2.0},{id:"Z",label:"Z"},{id:"X",label:"X"},{id:"C",label:"C"},{id:"V",label:"V"},{id:"B",label:"B"},
       {id:"N",label:"N"},{id:"M",label:"M"},{id:"COMMA",label:","},{id:"DOT",label:"."},{id:"SLASH",label:"/"},
       {id:"SHIFT_R",label:"Shift",w:2.2}],
      [{id:"SPACE",label:"Space",w:6.2}]
    ];

    const unit=48, gap=8, h=48, rx=10;
    const rowWidth = (row)=>row.reduce((sum,k)=>sum+(k.w??1)*unit+gap,0)-gap;
    const maxW = Math.max(...rows.map(rowWidth))+24;
    const totalH = rows.length*(h+gap)-gap+24;

    let svg = `<svg viewBox="0 0 ${maxW} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;
    rows.forEach((row,r)=>{
      let x=12, y=12 + r*(h+gap);
      row.forEach((k)=>{
        const w=(k.w??1)*unit;
        const id=`KEY_${k.id}`;
        svg += `
          <g>
            <rect id="${id}" class="key ${fingerClass(k.id)}" x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}"></rect>
            <text class="keyText" x="${x+w/2}" y="${y+h/2}">${escapeHtml(k.label)}</text>
          </g>`;
        x += w + gap;
      });
    });
    svg += `</svg>`;
    keyboardHost.innerHTML = svg;
  }

  function highlight(keyId){
    document.querySelectorAll(".key.hit").forEach(el=>el.classList.remove("hit"));
    if(!keyId) return;
    const el = document.getElementById(`KEY_${keyId}`);
    if(el){
      el.classList.add("hit");
      el.scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"});
    }
  }

  function setLast(k,ch){
    lastKeyEl.textContent = k || "-";
    lastCharEl.textContent = ch ? JSON.stringify(ch) : "-";
  }

  function delta(prev,next){
    if(next.startsWith(prev)) return next.slice(prev.length);
    return "";
  }

  function charToKeyId(ch){
    if(!ch) return "";
    if(ch===" ") return "SPACE";
    if(ch==="\n") return "ENTER";

    const up = ch.toUpperCase();
    if(/[A-Z]/.test(up)) return up;
    if(/[0-9]/.test(ch)) return ch;

    const sym = {
      "-":"MINUS","_":"MINUS","=":"EQUAL","+":"EQUAL",
      "[":"LBRACKET","{":"LBRACKET","]":"RBRACKET","}":"RBRACKET",
      "\\":"BACKSLASH","|":"BACKSLASH",";":"SEMICOLON",":":"SEMICOLON",
      "'":"QUOTE",'"':"QUOTE",",":"COMMA","<":"COMMA",".":"DOT",">":"DOT",
      "/":"SLASH","?":"SLASH","`":"BACKTICK","~":"BACKTICK"
    };
    return sym[ch] || "";
  }

  function keyEventToKeyId(e){
    const k = e.key;
    if(k===" ") return "SPACE";
    if(k==="Enter") return "ENTER";
    if(k==="Backspace") return "BACKSPACE";
    if(k==="Tab") return "TAB";
    if(k==="CapsLock") return "CAPS";
    if(k==="Shift") return (e.location===1 ? "SHIFT_L" : "SHIFT_R");
    if(/^[a-z]$/i.test(k)) return k.toUpperCase();
    if(/^[0-9]$/.test(k)) return k;
    const map = {"-":"MINUS","=":"EQUAL","[":"LBRACKET","]":"RBRACKET","\\":"BACKSLASH",";":"SEMICOLON","'":"QUOTE",",":"COMMA",".":"DOT","/":"SLASH","`":"BACKTICK"};
    return map[k] || "";
  }

  function extractQuery(text){
    const t=text.trim();
    if(!t) return "";
    const parts=t.split(/\s+/);
    return parts[parts.length-1] || "";
  }

  function buildLinks(q){
    const s=(q||"").trim();
    queryTextEl.textContent = s || "-";
    linkListEl.innerHTML = "";
    if(!s) return;

    const enc = encodeURIComponent(s);
    const items = [
      {title:"Wikipedia（検索）", url:`https://ja.wikipedia.org/wiki/Special:Search?search=${enc}`, note:"地名・一般語の入口"},
      {title:"辞書（Weblio）", url:`https://www.weblio.jp/content/${enc}`, note:"一般語の意味"},
      {title:"地図（Google Maps）", url:`https://www.google.com/maps/search/?api=1&query=${enc}`, note:"地名っぽいとき"},
      {title:"公式っぽいもの（検索）", url:`https://www.google.com/search?q=${enc}%20%E5%85%AC%E5%BC%8F`, note:"公式サイト探し"}
    ];

    for(const it of items){
      const li=document.createElement("li");
      li.innerHTML = `<a href="${it.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title)}<span>${escapeHtml(it.note)}</span></a>`;
      linkListEl.appendChild(li);
    }
  }

  function bestKey(modeKey){ return `best_${modeKey}`; }

  function loadBest(modeKey){
    try{
      const raw = localStorage.getItem(bestKey(modeKey));
      if(!raw) return null;
      return JSON.parse(raw);
    }catch{ return null; }
  }

  function formatTime(ms){
    return (ms/1000).toFixed(1) + " sec";
  }

  function renderBest(modeKey){
    const b = loadBest(modeKey);
    if(!b){
      bestTimeEl.textContent = "-";
      bestMistypeEl.textContent = "-";
      return;
    }
    bestTimeEl.textContent = formatTime(b.timeMs);
    bestMistypeEl.textContent = String(b.mistype);
  }

  function isNewRecord(newRec, oldRec){
    if(!oldRec) return true;
    if(newRec.timeMs < oldRec.timeMs) return true;
    if(newRec.timeMs > oldRec.timeMs) return false;
    return newRec.mistype < oldRec.mistype;
  }

  function saveBestIfNeeded(modeKey, timeMs, mistype){
    const newRec = { timeMs, mistype };
    const oldRec = loadBest(modeKey);
    if(isNewRecord(newRec, oldRec)){
      localStorage.setItem(bestKey(modeKey), JSON.stringify(newRec));
    }
    renderBest(modeKey);
  }

  function datasetForMode(mode){
    if(mode === "yamanote_inner") return yamanote_inner;
    if(mode === "yamanote_outer") return yamanote_outer;
    return null;
  }

  function showTrainingUI(on){
    trainingBox.style.display = on ? "block" : "none";
    scoreBox.style.display = on ? "block" : "none";
  }

  function resetRun(){
    state.idx = 0;
    state.started = false;
    state.startMs = 0;
    state.finishMs = 0;
    state.mistype = 0;
    typedEl.value = "";
    prevValue = "";
    timeNowEl.textContent = "-";
    mistypeNowEl.textContent = "0";
  }

  function currentTargetList(){
    const data = datasetForMode(state.mode);
    if(!data) return [];
    if(state.idx >= data.length) return [];
    const r = data[state.idx].roma;
    return Array.isArray(r) ? r : [r];
  }

  function updatePrompt(){
    const data = datasetForMode(state.mode);
    if(!data) return;

    const total = data.length;
    if(state.idx >= total){
      promptTitle.textContent = "FINISH";
      promptWord.textContent = "完了";
      promptRoma.textContent = "";
      progressBadge.textContent = `Finish · ${total}/${total}`;
      return;
    }

    const cur = data[state.idx];
    promptTitle.textContent = `山手線 ${state.mode === "yamanote_inner" ? "内回り" : "外回り"} · ${state.idx+1}/${total}`;
    promptWord.textContent = cur.jp;

    const targets = currentTargetList().map(t => normalizeRoma(t));
    promptRoma.textContent = `type: ${targets[0]}（揺れOK）`;

    progressBadge.textContent = `${state.idx+1}/${total}`;
    buildLinks(cur.jp);
  }

  function startIfNeeded(){
    if(state.started) return;
    state.started = true;
    state.startMs = performance.now();
  }

  function finishIfNeeded(){
    const data = datasetForMode(state.mode);
    if(!data) return;
    if(state.idx < data.length) return;

    if(!state.finishMs){
      state.finishMs = performance.now();
      const elapsed = Math.max(0, state.finishMs - state.startMs);
      timeNowEl.textContent = formatTime(elapsed);
      mistypeNowEl.textContent = String(state.mistype);
      saveBestIfNeeded(state.mode, elapsed, state.mistype);
    }
  }

  function updateScoreLive(){
    if(!state.started || state.finishMs) return;
    const now = performance.now();
    timeNowEl.textContent = formatTime(now - state.startMs);
    mistypeNowEl.textContent = String(state.mistype);
  }

  // Mistype logic for variation mode:
  // Count 1 mistype when the current normalized input is not a prefix of ANY valid target.
  function scoreAddedChars(added){
    if(!added) return;

    const targets = currentTargetList().map(t => normalizeRoma(t));
    if(targets.length === 0) return;

    const curNorm = normalizeRoma(typedEl.value);

    const isPrefix = targets.some(t => t.startsWith(curNorm));
    if(!isPrefix){
      state.mistype += 1;
    }
  }

  function tryAdvance(){
    const targets = currentTargetList().map(t => normalizeRoma(t));
    if(targets.length === 0) return;

    const curNorm = normalizeRoma(typedEl.value);

    const ok = targets.some(t => t === curNorm);
    if(ok){
      state.idx += 1;
      typedEl.value = "";
      prevValue = "";
      updatePrompt();

      if(state.idx >= datasetForMode(state.mode).length){
        finishIfNeeded();
      }
    }
  }

  function init(){
    const hasTouch = ("ontouchstart" in window) || navigator.maxTouchPoints>0;
    deviceHintEl.textContent = hasTouch
      ? "iPhone: 予測変換OFF推奨（ローマ字・揺れOK）"
      : "PC: ローマ字・揺れOK";

    renderKeyboard();
    buildLinks("");

    modeSelect.addEventListener("change", ()=>{
      state.mode = modeSelect.value;

      if(state.mode === "free"){
        showTrainingUI(false);
        progressBadge.textContent = "Free";
        resetRun();
        buildLinks(extractQuery(typedEl.value));
      }else{
        showTrainingUI(true);
        resetRun();
        updatePrompt();
        renderBest(state.mode);
      }

      typedEl.focus();
    });

    restartBtn.addEventListener("click", ()=>{
      if(state.mode === "free"){
        typedEl.value = "";
        prevValue = "";
        buildLinks("");
      }else{
        resetRun();
        updatePrompt();
        renderBest(state.mode);
      }
      typedEl.focus();
    });

    window.addEventListener("keydown",(e)=>{
      const id=keyEventToKeyId(e);
      if(id){
        highlight(id);
        setLast(id,e.key);
      }
    });

    typedEl.addEventListener("input",()=>{
      const next=typedEl.value;
      const added = delta(prevValue, next);
      const lastChar = added ? added.slice(-1) : "";

      if(added){
        const keyId=charToKeyId(lastChar);
        highlight(keyId);
        setLast(keyId||"(n/a)", lastChar);
      }else{
        highlight("");
        setLast("(edit)","");
      }

      if(state.mode !== "free"){
        if(next.length > 0) startIfNeeded();
        scoreAddedChars(added);
        updateScoreLive();
        tryAdvance();
      }else{
        buildLinks(extractQuery(next));
      }

      prevValue = next;
    });

    clearBtn.addEventListener("click",()=>{
      typedEl.value=""; prevValue="";
      highlight(""); setLast("","");

      if(state.mode === "free"){
        buildLinks("");
      }else{
        updateScoreLive();
      }
      typedEl.focus();
    });

    copyBtn.addEventListener("click",async ()=>{
      try{ await navigator.clipboard.writeText(typedEl.value); }catch{}
      typedEl.focus();
    });

    state.mode = "free";
    showTrainingUI(false);
    progressBadge.textContent = "Free";
  }

  init();
</script>
</body>
</html>
