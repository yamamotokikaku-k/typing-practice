<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>おとタイピング</title>
<style>
body{
font-family:sans-serif;
text-align:center;
margin-top:120px;
font-size:80px;
}
#start{
font-size:30px;
margin-top:40px;
}
</style>
</head>

<body>

<div id="kana">START</div>
<button id="start">クリックして開始</button>

<script>

const words=[
["あ","a"],["い","i"],["う","u"],["え","e"],["お","o"],
["か","ka"],["き","ki"],["く","ku"],["け","ke"],["こ","ko"]
]

let index=0
let pos=0
let started=false
let audioCtx

function beep(f){
const o=audioCtx.createOscillator()
const g=audioCtx.createGain()

o.frequency.value=f
o.connect(g)
g.connect(audioCtx.destination)

g.gain.value=0.1
o.start()
o.stop(audioCtx.currentTime+0.1)
}

function next(){
index++
if(index>=words.length)index=0
pos=0
document.getElementById("kana").textContent=words[index][0]
}

document.getElementById("start").onclick=()=>{
audioCtx=new (window.AudioContext||window.webkitAudioContext)()
started=true
document.getElementById("kana").textContent=words[index][0]
}

document.addEventListener("keydown",e=>{

if(!started)return

let target=words[index][1]

if(e.key===target[pos]){
beep(800)
pos++

if(pos>=target.length){
next()
}

}else{
beep(200)
}

})

</script>

</body>
</html>
