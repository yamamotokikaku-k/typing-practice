<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>タイピング練習</title>
  <style>
    :root{
      --fg:#111;
      --muted:#666;
      --ok:#0a7;
      --ng:#d22;
      --line:#e8e8e8;
      --bg:#fff;
    }
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing:.2px;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:28px 18px 40px;
      display:flex;
      flex-direction:column;
      gap:18px;
      min-height:100%;
      box-sizing:border-box;
    }
    header{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    header h1{margin:0;font-size:16px;font-weight:700;}
    .meta{
      display:flex;gap:14px;align-items:baseline;
      color:var(--muted);font-size:12px;white-space:nowrap;
    }
    .meta b{color:var(--fg);font-weight:700;}
    .card{border:1px solid var(--line);border-radius:14px;padding:18px 16px;}
    .center{text-align:center;}
    .stationJP{font-size:52px;font-weight:800;line-height:1.08;margin:6px 0 10px;}
    .stationRoma{font-size:18px;color:var(--muted);margin:0;letter-spacing:.6px;}
    .progress{
      margin-top:14px;
      font-size:22px;
      line-height:1.55;
      word-break:break-word;
      letter-spacing:.35px;
      user-select:none;
    }
    .progress .ok{color:var(--ok)}
    .progress .ng{color:var(--ng)}
    .progress .rest{color:var(--fg)}
    .hint{margin-top:12px;color:var(--muted);font-size:12px;text-align:center;}
    .actions{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
    button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--fg);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      cursor:pointer;
    }
    button:active{transform:translateY(1px)}
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
      border:1px solid var(--line);
      border-bottom-width:2px;
      padding:2px 6px;
      border-radius:8px;
      color:var(--fg);
      background:#fff;
    }

    .overlay{
      position:fixed;inset:0;
      background:rgba(255,255,255,.92);
      display:none;align-items:center;justify-content:center;
      z-index:10;
    }
    .overlay.show{display:flex}
    .panel{
      width:min(520px, calc(100vw - 36px));
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:18px 16px;
      box-sizing:border-box;
    }
    .count{text-align:center;}
    .count .big{font-size:84px;font-weight:900;line-height:1;margin:0;}
    .count .sub{margin:12px 0 0;font-size:12px;color:var(--muted);}

    .resultTitle{
      margin:0 0 10px;
      font-size:16px;
      font-weight:800;
      text-align:center;
    }
    .resultGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .resultItem{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 10px;
      text-align:center;
    }
    .resultItem .k{font-size:12px;color:var(--muted);margin:0 0 4px;}
    .resultItem .v{font-size:20px;font-weight:900;margin:0;}
    .resultActions{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-top:14px;
      flex-wrap:wrap;
    }

    footer{
      margin-top:auto;
      padding-top:14px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>タイピング練習</h1>
      <div class="meta">
        <span>駅: <b id="statIndex">1</b>/<span id="statTotal">30</span></span>
        <span>経過: <b id="statTime">0:00</b></span>
        <span>正確率: <b id="statAcc">100</b>%</span>
        <span>WPM: <b id="statWpm">0</b></span>
        <span>ミス: <b id="statMiss">0</b></span>
      </div>
    </header>

    <section class="card center">
      <div class="stationJP" id="jp">東京</div>
      <p class="stationRoma" id="roma">toukyou</p>

      <div class="progress" id="progress" aria-label="typing progress"></div>

      <div class="hint" id="stateHint">
        <span class="kbd">Enter</span> で開始
      </div>

      <div class="actions">
        <button id="btnSkip" type="button">次へ</button>
        <button id="btnReset" type="button">リセット</button>
      </div>
    </section>

    <footer>入力欄なし（キーボード入力のみ）</footer>
  </div>

  <!-- Countdown overlay -->
  <div class="overlay" id="overlayCountdown" role="dialog" aria-modal="true" aria-label="countdown">
    <div class="count">
      <p class="big" id="countText">3</p>
      <p class="sub">開始前は入力を受け付けません</p>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="overlay" id="overlayResult" role="dialog" aria-modal="true" aria-label="result">
    <div class="panel">
      <p class="resultTitle">結果（山手線一周）</p>

      <div class="resultGrid">
        <div class="resultItem">
          <p class="k">タイム</p>
          <p class="v" id="resTime">0:00</p>
        </div>
        <div class="resultItem">
          <p class="k">正確率</p>
          <p class="v" id="resAcc">100%</p>
        </div>
        <div class="resultItem">
          <p class="k">WPM</p>
          <p class="v" id="resWpm">0</p>
        </div>
        <div class="resultItem">
          <p class="k">ミス</p>
          <p class="v" id="resMiss">0</p>
        </div>
      </div>

      <div class="resultActions">
        <button id="btnRestart" type="button">もう一周</button>
        <button id="btnClose" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    // 山手線（30駅）: かな読み → ローマ字打ち
    // ※「一周」扱いにするため、順番は固定（この配列順）
    const STATIONS = [
      { jp:"東京",       kana:"とうきょう" },
      { jp:"有楽町",     kana:"ゆうらくちょう" },
      { jp:"新橋",       kana:"しんばし" },
      { jp:"浜松町",     kana:"はままつちょう" },
      { jp:"田町",       kana:"たまち" },
      { jp:"高輪ゲートウェイ", kana:"たかなわげーとうぇい" },
      { jp:"品川",       kana:"しながわ" },
      { jp:"大崎",       kana:"おおさき" },
      { jp:"五反田",     kana:"ごたんだ" },
      { jp:"目黒",       kana:"めぐろ" },
      { jp:"恵比寿",     kana:"えびす" },
      { jp:"渋谷",       kana:"しぶや" },
      { jp:"原宿",       kana:"はらじゅく" },
      { jp:"代々木",     kana:"よよぎ" },
      { jp:"新宿",       kana:"しんじゅく" },
      { jp:"新大久保",   kana:"しんおおくぼ" },
      { jp:"高田馬場",   kana:"たかだのばば" },
      { jp:"目白",       kana:"めじろ" },
      { jp:"池袋",       kana:"いけぶくろ" },
      { jp:"大塚",       kana:"おおつか" },
      { jp:"巣鴨",       kana:"すがも" },
      { jp:"駒込",       kana:"こまごめ" },
      { jp:"田端",       kana:"たばた" },
      { jp:"西日暮里",   kana:"にしにっぽり" },
      { jp:"日暮里",     kana:"にっぽり" },
      { jp:"鶯谷",       kana:"うぐいすだに" },
      { jp:"上野",       kana:"うえの" },
      { jp:"御徒町",     kana:"おかちまち" },
      { jp:"秋葉原",     kana:"あきはばら" },
      { jp:"神田",       kana:"かんだ" },
    ];

    // ---- State ----
    let idx = 0;

    let accepting = false;     // 入力受付中
    let startedAt = null;      // Goの瞬間
    let finishedAt = null;     // 終了時刻
    let totalTyped = 0;        // 打鍵数（正誤含む）
    let totalMiss = 0;         // ミス数

    let displayRoma = "";      // 表示用（代表ローマ字）
    let target = "";           // 表示進捗用（正規化）
    let candidates = [];       // 入力判定用（正規化済み候補）
    let typed = "";            // 正規化済み入力

    let tickTimer = null;      // 経過表示更新

    // ---- DOM ----
    const elJp = document.getElementById("jp");
    const elRoma = document.getElementById("roma");
    const elProg = document.getElementById("progress");
    const elHint = document.getElementById("stateHint");

    const elIdx = document.getElementById("statIndex");
    const elTotal = document.getElementById("statTotal");
    const elTime = document.getElementById("statTime");
    const elAcc = document.getElementById("statAcc");
    const elWpm = document.getElementById("statWpm");
    const elMiss = document.getElementById("statMiss");

    const overlayCountdown = document.getElementById("overlayCountdown");
    const countText = document.getElementById("countText");

    const overlayResult = document.getElementById("overlayResult");
    const resTime = document.getElementById("resTime");
    const resAcc = document.getElementById("resAcc");
    const resWpm = document.getElementById("resWpm");
    const resMiss = document.getElementById("resMiss");

    document.getElementById("btnSkip").addEventListener("click", () => {
      if (!accepting) { nextStation(); return; }
      nextStation();
    });
    document.getElementById("btnReset").addEventListener("click", resetAll);

    document.getElementById("btnRestart").addEventListener("click", () => {
      overlayResult.classList.remove("show");
      resetAll();
      // すぐ開始したいなら次行を有効化
      // startCountdown();
    });
    document.getElementById("btnClose").addEventListener("click", () => {
      overlayResult.classList.remove("show");
    });

    // ---- Helpers ----
    function normalizeRoma(s){
      const fwToHw = (ch) => {
        const code = ch.charCodeAt(0);
        if (code >= 0xFF10 && code <= 0xFF19) return String.fromCharCode(code - 0xFF10 + 0x30);
        if (code >= 0xFF21 && code <= 0xFF3A) return String.fromCharCode(code - 0xFF21 + 0x41);
        if (code >= 0xFF41 && code <= 0xFF5A) return String.fromCharCode(code - 0xFF41 + 0x61);
        return ch;
      };
      return Array.from(String(s))
        .map(fwToHw).join("")
        .toLowerCase()
        .replace(/[\s\-_'.]/g,"");
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function nowMs(){ return performance.now(); }

    function formatMs(ms){
      ms = Math.max(0, Math.round(ms));
      const totalSec = Math.floor(ms / 1000);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function elapsedMs(){
      if (!startedAt) return 0;
      const end = finishedAt ?? nowMs();
      return end - startedAt;
    }

    function calcAcc(){
      if (totalTyped === 0) return 100;
      const ok = totalTyped - totalMiss;
      return Math.max(0, Math.round((ok / totalTyped) * 100));
    }

    function calcWpm(){
      if (!startedAt) return 0;
      const minutes = elapsedMs() / 60000;
      if (minutes <= 0) return 0;
      return Math.max(0, Math.round((totalTyped / 5) / minutes));
    }

    function updateStats(){
      elIdx.textContent = String(Math.min(idx+1, STATIONS.length));
      elTotal.textContent = String(STATIONS.length);
      elTime.textContent = formatMs(elapsedMs());
      elAcc.textContent = String(calcAcc());
      elWpm.textContent = String(calcWpm());
      elMiss.textContent = String(totalMiss);
    }

    function startTick(){
      stopTick();
      tickTimer = setInterval(updateStats, 200);
    }
    function stopTick(){
      if (tickTimer){ clearInterval(tickTimer); tickTimer = null; }
    }

    // ---- Kana -> Romaji candidates ----
    const MAP = {
      "あ":["a"],"い":["i"],"う":["u"],"え":["e"],"お":["o"],
      "か":["ka"],"き":["ki"],"く":["ku"],"け":["ke"],"こ":["ko"],
      "さ":["sa"],"し":["shi","si"],"す":["su"],"せ":["se"],"そ":["so"],
      "た":["ta"],"ち":["chi","ti"],"つ":["tsu","tu"],"て":["te"],"と":["to"],
      "な":["na"],"に":["ni"],"ぬ":["nu"],"ね":["ne"],"の":["no"],
      "は":["ha"],"ひ":["hi"],"ふ":["fu","hu"],"へ":["he"],"ほ":["ho"],
      "ま":["ma"],"み":["mi"],"む":["mu"],"め":["me"],"も":["mo"],
      "や":["ya"],"ゆ":["yu"],"よ":["yo"],
      "ら":["ra"],"り":["ri"],"る":["ru"],"れ":["re"],"ろ":["ro"],
      "わ":["wa"],"を":["wo","o"],
      "ん":["n","nn","n'"],
      "が":["ga"],"ぎ":["gi"],"ぐ":["gu"],"げ":["ge"],"ご":["go"],
      "ざ":["za"],"じ":["ji","zi"],"ず":["zu"],"ぜ":["ze"],"ぞ":["zo"],
      "だ":["da"],"ぢ":["ji","di","zi"],"づ":["zu","du"],"で":["de"],"ど":["do"],
      "ば":["ba"],"び":["bi"],"ぶ":["bu"],"べ":["be"],"ぼ":["bo"],
      "ぱ":["pa"],"ぴ":["pi"],"ぷ":["pu"],"ぺ":["pe"],"ぽ":["po"],
      "ぁ":["xa","la"],"ぃ":["xi","li"],"ぅ":["xu","lu"],"ぇ":["xe","le"],"ぉ":["xo","lo"],
      "ゃ":["xya","lya"],"ゅ":["xyu","lyu"],"ょ":["xyo","lyo"],
      "ゔ":["vu"],
      "ー":["-"],
    };
    const DIG = {
      "きゃ":["kya"],"きゅ":["kyu"],"きょ":["kyo"],
      "ぎゃ":["gya"],"ぎゅ":["gyu"],"ぎょ":["gyo"],
      "しゃ":["sha","sya"],"しゅ":["shu","syu"],"しょ":["sho","syo"],
      "じゃ":["ja","jya","zya"],"じゅ":["ju","jyu","zyu"],"じょ":["jo","jyo","zyo"],
      "ちゃ":["cha","tya"],"ちゅ":["chu","tyu"],"ちょ":["cho","tyo"],
      "にゃ":["nya"],"にゅ":["nyu"],"にょ":["nyo"],
      "ひゃ":["hya"],"ひゅ":["hyu"],"ひょ":["hyo"],
      "びゃ":["bya"],"びゅ":["byu"],"びょ":["byo"],
      "ぴゃ":["pya"],"ぴゅ":["pyu"],"ぴょ":["pyo"],
      "みゃ":["mya"],"みゅ":["myu"],"みょ":["myo"],
      "りゃ":["rya"],"りゅ":["ryu"],"りょ":["ryo"],
      "うぃ":["wi"],"うぇ":["we"],"うぉ":["wo","o"],
      "てぃ":["ti"],"でぃ":["di"],
      "とぅ":["tu"],"どぅ":["du"],
      "ふぁ":["fa"],"ふぃ":["fi"],"ふぇ":["fe"],"ふぉ":["fo"],
      "しぇ":["she","sye"],
      "ちぇ":["che","tye"],
      "じぇ":["je","jye","zye"],
    };

    function toHiragana(s){
      return String(s).replace(/[\u30A1-\u30F6]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    }
    function lastVowel(str){
      for (let i=str.length-1;i>=0;i--){
        const c = str[i];
        if ("aeiou".includes(c)) return c;
      }
      return "";
    }
    function combine(listA, listB, limit=3000){
      const out = [];
      for (const a of listA){
        for (const b of listB){
          out.push(a + b);
          if (out.length >= limit) return out;
        }
      }
      return out;
    }
    function kanaToRomajiCandidates(kana){
      const s = toHiragana(kana);
      let i = 0;
      let acc = [""];

      while (i < s.length){
        const ch = s[i];

        if (ch === "っ"){
          const next2 = s.slice(i+1, i+3);
          const next1 = s.slice(i+1, i+2);
          const nextOpts = DIG[next2] || MAP[next1] || [];
          const doubled = [];
          for (const opt of nextOpts){
            const c = opt[0];
            if (c && /[a-z]/.test(c) && !["a","i","u","e","o","n"].includes(c)){
              doubled.push(c);
            }
          }
          if (doubled.length){
            acc = combine(acc, Array.from(new Set(doubled)));
          }else{
            acc = combine(acc, ["xtu","ltu"]);
          }
          i += 1;
          continue;
        }

        const dig = s.slice(i, i+2);
        if (DIG[dig]){
          acc = combine(acc, DIG[dig]);
          i += 2;
          continue;
        }

        if (ch === "ー"){
          const withDash = combine(acc, ["-"]);
          const withVowel = [];
          for (const a of acc){
            const v = lastVowel(a);
            if (v) withVowel.push(a + v);
          }
          acc = Array.from(new Set([...withDash, ...withVowel]));
          i += 1;
          continue;
        }

        if (MAP[ch]){
          acc = combine(acc, MAP[ch]);
          i += 1;
          continue;
        }

        i += 1;
      }
      return Array.from(new Set(acc)).filter(x=>x.length);
    }

    function pickDisplayRoma(cands){
      const sorted = [...cands].sort((a,b)=>{
        const aDash = a.includes("-") ? 1 : 0;
        const bDash = b.includes("-") ? 1 : 0;
        if (aDash !== bDash) return aDash - bDash;
        return a.length - b.length;
      });
      return sorted[0] || "";
    }

    // ---- Rendering / Station ----
    function renderProgress(){
      const t = target;
      const p = typed;

      const isPrefixSome = candidates.some(c => c.startsWith(p));
      const okLen = (() => {
        if (isPrefixSome) return p.length;
        let best = 0;
        for (const c of candidates){
          const m = Math.min(c.length, p.length);
          let k = 0;
          while (k < m && c[k] === p[k]) k++;
          if (k > best) best = k;
        }
        return best;
      })();

      const ok = t.slice(0, okLen);
      const rest = t.slice(okLen);

      let ng = "";
      if (!isPrefixSome && p.length > 0){
        ng = p.slice(okLen, okLen + 1);
      }

      elProg.innerHTML =
        `<span class="ok">${escapeHtml(ok)}</span>` +
        (ng ? `<span class="ng">${escapeHtml(ng)}</span>` : ``) +
        `<span class="rest">${escapeHtml(rest)}</span>`;

      updateStats();
    }

    function setStation(st){
      elJp.textContent = st.jp;

      const rawCands = kanaToRomajiCandidates(st.kana);
      displayRoma = pickDisplayRoma(rawCands);
      elRoma.textContent = displayRoma;

      candidates = rawCands.map(normalizeRoma);
      target = normalizeRoma(displayRoma);

      typed = "";
      renderProgress();
    }

    function finishLap(){
      accepting = false;
      finishedAt = nowMs();
      stopTick();
      updateStats();

      resTime.textContent = formatMs(elapsedMs());
      resAcc.textContent = `${calcAcc()}%`;
      resWpm.textContent = String(calcWpm());
      resMiss.textContent = String(totalMiss);

      overlayResult.classList.add("show");
      elHint.innerHTML = `<span class="kbd">Enter</span> で開始`;
    }

    function nextStation(){
      // 既に終了しているなら進めない
      if (finishedAt) return;

      idx++;

      if (idx >= STATIONS.length){
        // 一周完了
        finishLap();
        return;
      }

      setStation(STATIONS[idx]);
      updateStats();
    }

    function resetAll(){
      idx = 0;
      accepting = false;
      startedAt = null;
      finishedAt = null;
      totalTyped = 0;
      totalMiss = 0;
      typed = "";

      overlayResult.classList.remove("show");
      stopTick();

      setStation(STATIONS[idx]);
      elHint.innerHTML = `<span class="kbd">Enter</span> で開始`;
      updateStats();
    }

    // ---- Countdown ----
    async function startCountdown(){
      if (finishedAt) return; // 終了後はリスタートで
      accepting = false;

      overlayCountdown.classList.add("show");
      const seq = ["3","2","1","Go"];
      for (let i=0;i<seq.length;i++){
        countText.textContent = seq[i];
        await sleep(i === seq.length-1 ? 450 : 650);
      }
      overlayCountdown.classList.remove("show");

      accepting = true;

      // 初回スタート時のみ計測開始（途中駅でEnterを押しても無視する設計）
      if (!startedAt){
        startedAt = nowMs();
        startTick();
        totalTyped = 0;
        totalMiss = 0;
        typed = "";
      }

      elHint.textContent = "";
      renderProgress();
    }
    function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

    // ---- Input handling ----
    function isPrintableKey(e){
      if (e.ctrlKey || e.metaKey || e.altKey) return false;
      if (e.key.length !== 1) return false;
      return /[a-zA-Z0-9\-'\. _]/.test(e.key);
    }

    function handleChar(ch){
      const key = normalizeRoma(ch);
      if (!key) return;
      if (key.length !== 1) return;

      typed += key;
      totalTyped += 1;

      const isPrefixSome = candidates.some(c => c.startsWith(typed));
      if (!isPrefixSome) totalMiss += 1;

      renderProgress();

      // 完了：候補と完全一致
      if (candidates.some(c => c === typed)){
        accepting = false;
        setTimeout(() => {
          // 終了してなければ次へ
          if (!finishedAt){
            accepting = true;
            nextStation();
          }
        }, 180);
      }
    }

    function handleBackspace(){
      if (typed.length === 0) return;
      typed = typed.slice(0, -1);
      renderProgress();
    }

    window.addEventListener("keydown", (e) => {
      // 結果表示中は Enter で閉じる（誤爆防止で入力は無効）
      if (overlayResult.classList.contains("show")){
        if (e.key === "Enter"){
          e.preventDefault();
          overlayResult.classList.remove("show");
        }
        return;
      }

      // 開始前（未スタート）: Enterのみ受付
      if (!accepting){
        if (e.key === "Enter" && !startedAt){
          e.preventDefault();
          startCountdown();
        }
        return;
      }

      // 開始後
      if (e.key === "Enter"){
        e.preventDefault();
        return;
      }
      if (e.key === "Backspace"){
        e.preventDefault();
        handleBackspace();
        return;
      }
      if (isPrintableKey(e)){
        e.preventDefault();
        handleChar(e.key);
      }
    }, { passive:false });

    // ---- Init ----
    resetAll();
  </script>
</body>
</html>
