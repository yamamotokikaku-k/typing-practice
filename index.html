<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>山手線タイピング練習</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f7f7;
      color: #111;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      text-align: center;
    }
    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }
    .controls label {
      font-size: 14px;
      color: #333;
    }
    select, button {
      font: inherit;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #bbb;
      background: #fff;
      cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
    .station-area {
      text-align: center;
      padding: 18px 8px 8px;
    }
    .lap-info {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }
    .jp {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin: 8px 0 10px;
      min-height: 1.4em;
    }
    .roma {
      font-size: 28px;
      letter-spacing: 0.04em;
      min-height: 1.5em;
      word-break: break-all;
    }
    .roma .done { color: #999; }
    .roma .current {
      color: #d00;
      text-decoration: underline;
    }
    .roma .rest { color: #111; }
    .sub {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-top: 12px;
      min-height: 1.5em;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .stat {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stat .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .stat .value {
      font-size: 24px;
      font-weight: 700;
    }
    .result-box {
      text-align: center;
      padding: 10px 0 4px;
    }
    .result-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .result-main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .result-card {
      min-width: 160px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
    }
    .result-card .k {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    .result-card .v {
      font-size: 26px;
      font-weight: 700;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e5e5;
      text-align: center;
    }
    th {
      background: #fafafa;
      font-weight: 700;
    }
    .rank-note {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      text-align: right;
    }
    .empty {
      text-align: center;
      color: #777;
      padding: 14px 0 6px;
      font-size: 14px;
    }
    .footer-note {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-top: 8px;
    }
    @media (max-width: 720px) {
      .jp { font-size: 38px; }
      .roma { font-size: 22px; }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>山手線タイピング練習</h1>

    <div class="panel">
      <div class="controls">
        <label>
          周回モード
          <select id="lapSelect">
            <option value="1">1周</option>
            <option value="2">2周</option>
            <option value="3">3周</option>
            <option value="4">4周</option>
            <option value="5">5周</option>
          </select>
        </label>
        <button id="startBtn">スタート</button>
        <button id="resetRankBtn">ランキング削除</button>
      </div>
      <div class="footer-note">Enterでもスタートできます</div>
    </div>

    <div class="panel">
      <div class="station-area">
        <div class="lap-info" id="lapInfo">未開始</div>
        <div class="jp" id="jpStation">山手線</div>
        <div class="roma" id="romaStation">Enter または スタートで開始</div>
        <div class="sub" id="subMessage">入力欄なし。キーボードをそのまま打つ</div>
      </div>
    </div>

    <div class="panel">
      <div class="stats">
        <div class="stat">
          <div class="label">タイム</div>
          <div class="value" id="timeStat">0.00秒</div>
        </div>
        <div class="stat">
          <div class="label">正確率</div>
          <div class="value" id="accuracyStat">100.00%</div>
        </div>
        <div class="stat">
          <div class="label">正打鍵</div>
          <div class="value" id="correctStat">0</div>
        </div>
        <div class="stat">
          <div class="label">ミス</div>
          <div class="value" id="missStat">0</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="result-box" id="resultBox">
        <div class="result-title">今回の結果</div>
        <div class="result-main">
          <div class="result-card">
            <div class="k">タイム</div>
            <div class="v" id="resultTime">-</div>
          </div>
          <div class="result-card">
            <div class="k">正確率</div>
            <div class="v" id="resultAccuracy">-</div>
          </div>
          <div class="result-card">
            <div class="k">周回</div>
            <div class="v" id="resultLaps">-</div>
          </div>
        </div>
        <div class="sub" id="resultSub">まだ記録はありません</div>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 12px; font-size:22px;">正確率ランキング TOP10</h2>
      <div id="rankingWrap"></div>
      <div class="rank-note">順位は正確率のみで決定。タイムは表示のみ。</div>
    </div>
  </div>

  <script>
    const STATIONS = [
      { jp: "東京", roma: "tokyo" },
      { jp: "神田", roma: "kanda" },
      { jp: "秋葉原", roma: "akihabara" },
      { jp: "御徒町", roma: "okachimachi" },
      { jp: "上野", roma: "ueno" },
      { jp: "鶯谷", roma: "uguisudani" },
      { jp: "日暮里", roma: "nippori" },
      { jp: "西日暮里", roma: "nishinippori" },
      { jp: "田端", roma: "tabata" },
      { jp: "駒込", roma: "komagome" },
      { jp: "巣鴨", roma: "sugamo" },
      { jp: "大塚", roma: "otsuka" },
      { jp: "池袋", roma: "ikebukuro" },
      { jp: "目白", roma: "mejiro" },
      { jp: "高田馬場", roma: "takadanobaba" },
      { jp: "新大久保", roma: "shinokubo" },
      { jp: "新宿", roma: "shinjuku" },
      { jp: "代々木", roma: "yoyogi" },
      { jp: "原宿", roma: "harajuku" },
      { jp: "渋谷", roma: "shibuya" },
      { jp: "恵比寿", roma: "ebisu" },
      { jp: "目黒", roma: "meguro" },
      { jp: "五反田", roma: "gotanda" },
      { jp: "大崎", roma: "osaki" },
      { jp: "品川", roma: "shinagawa" },
      { jp: "高輪ゲートウェイ", roma: "takanawagateway" },
      { jp: "田町", roma: "tamachi" },
      { jp: "浜松町", roma: "hamamatsucho" },
      { jp: "新橋", roma: "shimbashi" },
      { jp: "有楽町", roma: "yurakucho" }
    ];

    const RANKING_KEY = "yamanote_accuracy_ranking_v1";

    const lapSelect = document.getElementById("lapSelect");
    const startBtn = document.getElementById("startBtn");
    const resetRankBtn = document.getElementById("resetRankBtn");

    const lapInfo = document.getElementById("lapInfo");
    const jpStation = document.getElementById("jpStation");
    const romaStation = document.getElementById("romaStation");
    const subMessage = document.getElementById("subMessage");

    const timeStat = document.getElementById("timeStat");
    const accuracyStat = document.getElementById("accuracyStat");
    const correctStat = document.getElementById("correctStat");
    const missStat = document.getElementById("missStat");

    const resultTime = document.getElementById("resultTime");
    const resultAccuracy = document.getElementById("resultAccuracy");
    const resultLaps = document.getElementById("resultLaps");
    const resultSub = document.getElementById("resultSub");

    const rankingWrap = document.getElementById("rankingWrap");

    let isPlaying = false;
    let totalLaps = 1;
    let currentLap = 1;
    let stationIndex = 0;
    let charIndex = 0;
    let startTime = 0;
    let timerId = null;

    let correctCount = 0;
    let missCount = 0;
    let totalTyped = 0;
    let currentRunId = null;

    function formatTime(ms) {
      return (ms / 1000).toFixed(2) + "秒";
    }

    function getAccuracy() {
      if (totalTyped === 0) return 100;
      return (correctCount / totalTyped) * 100;
    }

    function saveRanking(entry) {
      const ranking = loadRanking();
      ranking.push(entry);

      ranking.sort((a, b) => {
        if (b.accuracy !== a.accuracy) return b.accuracy - a.accuracy;
        return a.createdAt - b.createdAt;
      });

      const top10 = ranking.slice(0, 10);
      localStorage.setItem(RANKING_KEY, JSON.stringify(top10));
    }

    function loadRanking() {
      try {
        const raw = localStorage.getItem(RANKING_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function renderRanking(highlightId = null) {
      const ranking = loadRanking();

      if (!ranking.length) {
        rankingWrap.innerHTML = '<div class="empty">まだランキングはありません</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>順位</th>
              <th>正確率</th>
              <th>タイム</th>
              <th>周回</th>
              <th>日時</th>
            </tr>
          </thead>
          <tbody>
      `;

      ranking.forEach((item, i) => {
        const d = new Date(item.createdAt);
        const dt = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        const bg = item.id === highlightId ? ' style="background:#fff6cc;"' : "";
        html += `
          <tr${bg}>
            <td>${i + 1}</td>
            <td>${item.accuracy.toFixed(2)}%</td>
            <td>${formatTime(item.timeMs)}</td>
            <td>${item.laps}周</td>
            <td>${dt}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      rankingWrap.innerHTML = html;
    }

    function updateStats() {
      const elapsed = isPlaying ? (Date.now() - startTime) : 0;
      timeStat.textContent = formatTime(elapsed);
      accuracyStat.textContent = getAccuracy().toFixed(2) + "%";
      correctStat.textContent = correctCount;
      missStat.textContent = missCount;
    }

    function startTimer() {
      stopTimer();
      timerId = setInterval(updateStats, 50);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function renderCurrentStation() {
      const station = STATIONS[stationIndex];
      const roma = station.roma;

      lapInfo.textContent = `${currentLap} / ${totalLaps} 周　|　${stationIndex + 1} / ${STATIONS.length} 駅`;
      jpStation.textContent = station.jp;

      const done = roma.slice(0, charIndex);
      const current = roma[charIndex] || "";
      const rest = roma.slice(charIndex + 1);

      romaStation.innerHTML =
        `<span class="done">${escapeHtml(done)}</span>` +
        `<span class="current">${escapeHtml(current)}</span>` +
        `<span class="rest">${escapeHtml(rest)}</span>`;

      subMessage.textContent = "キーボードでそのまま入力";
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function resetRunState() {
      currentLap = 1;
      stationIndex = 0;
      charIndex = 0;
      correctCount = 0;
      missCount = 0;
      totalTyped = 0;
      updateStats();
    }

    function startGame() {
      totalLaps = Number(lapSelect.value);
      resetRunState();
      isPlaying = true;
      currentRunId = "run_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      startTime = Date.now();
      renderCurrentStation();
      startTimer();

      resultTime.textContent = "-";
      resultAccuracy.textContent = "-";
      resultLaps.textContent = "-";
      resultSub.textContent = "プレイ中";
    }

    function finishGame() {
      isPlaying = false;
      stopTimer();

      const elapsed = Date.now() - startTime;
      const accuracy = getAccuracy();

      timeStat.textContent = formatTime(elapsed);
      accuracyStat.textContent = accuracy.toFixed(2) + "%";

      resultTime.textContent = formatTime(elapsed);
      resultAccuracy.textContent = accuracy.toFixed(2) + "%";
      resultLaps.textContent = totalLaps + "周";
      resultSub.textContent = `正打鍵 ${correctCount} / ミス ${missCount}`;

      const entry = {
        id: currentRunId,
        accuracy,
        timeMs: elapsed,
        laps: totalLaps,
        createdAt: Date.now()
      };

      saveRanking(entry);
      renderRanking(currentRunId);

      lapInfo.textContent = "完了";
      jpStation.textContent = "終了";
      romaStation.textContent = "Enter または スタートで再開";
      subMessage.textContent = "ランキングは正確率のみで決定";
    }

    function moveNextStation() {
      charIndex = 0;
      stationIndex++;

      if (stationIndex >= STATIONS.length) {
        stationIndex = 0;
        currentLap++;
      }

      if (currentLap > totalLaps) {
        finishGame();
        return;
      }

      renderCurrentStation();
    }

    function handleKeyInput(key) {
      if (!isPlaying) return;

      if (key.length !== 1) return;

      const expected = STATIONS[stationIndex].roma[charIndex];
      if (!expected) return;

      const input = key.toLowerCase();

      totalTyped++;

      if (input === expected) {
        correctCount++;
        charIndex++;

        if (charIndex >= STATIONS[stationIndex].roma.length) {
          moveNextStation();
        } else {
          renderCurrentStation();
        }
      } else {
        missCount++;
      }

      updateStats();
    }

    startBtn.addEventListener("click", startGame);

    resetRankBtn.addEventListener("click", () => {
      if (!confirm("ランキングを削除しますか？")) return;
      localStorage.removeItem(RANKING_KEY);
      renderRanking();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !isPlaying) {
        startGame();
        return;
      }
      handleKeyInput(e.key);
    });

    renderRanking();
    updateStats();
  </script>
</body>
</html>
