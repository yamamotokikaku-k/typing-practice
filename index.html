<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>名言タイピング練習</title>
  <style>
    :root{
      --bg:#0c1630;
      --bg-deep:#07101f;
      --bg-light:#1d2d57;
      --gold:#d7b56d;
      --gold-soft:#edd7a6;
      --panel:rgba(255,255,255,.08);
      --panel-strong:rgba(255,255,255,.12);
      --line:rgba(215,181,109,.24);

      --text:#f5f1e6;
      --sub:#d8cba8;

      --display-main:#fff9ee;
      --display-sub:#ead8ad;
      --typed:#111111;
      --typed-bg:rgba(215,181,109,.85);

      --accent:#f1d38a;
      --ok:#fff4c8;
      --miss:#ff9a9a;

      --shadow:0 20px 50px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,244,200,.14), transparent 24%),
        radial-gradient(circle at 50% 0%, rgba(215,181,109,.10), transparent 34%),
        linear-gradient(180deg, var(--bg-light) 0%, var(--bg) 44%, var(--bg-deep) 100%);
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .app{
      width:min(1180px,100%);
      min-height:86vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:18px;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px 20px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
    }

    .title{
      font-size:clamp(22px,2.8vw,34px);
      font-weight:900;
      letter-spacing:.06em;
      color:var(--gold-soft);
      text-shadow:0 2px 18px rgba(0,0,0,.24);
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
    }

    .mode-btn{
      border:none;
      background:rgba(255,255,255,.10);
      color:var(--gold-soft);
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      letter-spacing:.04em;
      box-shadow:0 3px 10px rgba(0,0,0,.12);
      transition:.15s transform,.15s background,.15s box-shadow,.15s color;
    }

    .mode-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.16);
    }

    .mode-btn.active{
      background:linear-gradient(180deg, #f3deab, #caa45a);
      color:#22170a;
      box-shadow:0 10px 22px rgba(0,0,0,.22);
    }

    .sound-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
      color:var(--gold-soft);
      font-weight:900;
      min-height:44px;
    }

    .sound-select{
      appearance:none;
      border:none;
      outline:none;
      background:transparent;
      color:var(--display-main);
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      min-width:180px;
    }

    .sound-select option{
      color:#111;
    }

    .main{
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--line);
      border-radius:32px;
      padding:28px 22px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      isolation:isolate;
    }

    .main::before{
      content:"";
      position:absolute;
      inset:auto -12% -34% -12%;
      height:55%;
      background:
        radial-gradient(ellipse at center, rgba(215,181,109,.18), transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    .main::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 14%, rgba(255,240,196,.08), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
      pointer-events:none;
      z-index:0;
    }

    .silhouettes{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.42;
    }

    .figure{
      position:absolute;
      bottom:-14px;
      filter:drop-shadow(0 14px 28px rgba(0,0,0,.4));
    }

    .figure .head{
      position:absolute;
      border-radius:50%;
      background:linear-gradient(180deg, rgba(5,8,14,.92), rgba(17,24,40,.96));
    }

    .figure .body{
      position:absolute;
      background:linear-gradient(180deg, rgba(10,14,24,.95), rgba(18,24,40,.98));
      border-radius:46% 46% 20% 20% / 40% 40% 14% 14%;
    }

    .figure .cape{
      position:absolute;
      background:linear-gradient(180deg, rgba(8,12,20,.94), rgba(16,22,36,.98));
      clip-path:polygon(18% 0, 82% 0, 100% 100%, 0 100%);
      border-radius:18px;
    }

    .figure .hat{
      position:absolute;
      background:linear-gradient(180deg, rgba(6,10,18,.94), rgba(14,20,34,.98));
    }

    .figure.f1{
      left:1.5%;
      width:250px;
      height:320px;
      transform:scale(.95);
    }
    .figure.f1 .head{ width:60px;height:60px;left:92px;top:72px; }
    .figure.f1 .body{ width:150px;height:170px;left:48px;top:120px; }
    .figure.f1 .cape{ width:182px;height:140px;left:30px;top:150px; }
    .figure.f1 .hat{ width:96px;height:22px;left:74px;top:62px;border-radius:50px; }

    .figure.f2{
      left:19%;
      width:180px;
      height:270px;
      opacity:.78;
      transform:scale(.84);
    }
    .figure.f2 .head{ width:56px;height:56px;left:60px;top:64px; }
    .figure.f2 .body{ width:122px;height:154px;left:28px;top:112px; border-radius:38% 38% 18% 18% / 34% 34% 14% 14%; }
    .figure.f2 .cape{ width:146px;height:118px;left:17px;top:146px; }
    .figure.f2 .hat{ width:84px;height:16px;left:46px;top:56px;border-radius:50px; transform:rotate(-7deg); }

    .figure.f3{
      right:17%;
      width:210px;
      height:290px;
      opacity:.8;
      transform:scale(.9);
    }
    .figure.f3 .head{ width:58px;height:58px;left:76px;top:66px; }
    .figure.f3 .body{ width:138px;height:168px;left:36px;top:116px; }
    .figure.f3 .cape{ width:170px;height:128px;left:18px;top:148px; }
    .figure.f3 .hat{
      width:34px;height:90px;left:88px;top:0;
      border-radius:18px 18px 8px 8px;
      transform:rotate(4deg);
    }

    .figure.f4{
      right:0;
      width:270px;
      height:330px;
      transform:scale(.98);
    }
    .figure.f4 .head{ width:62px;height:62px;left:96px;top:76px; }
    .figure.f4 .body{ width:158px;height:184px;left:54px;top:126px; }
    .figure.f4 .cape{ width:196px;height:152px;left:34px;top:154px; }
    .figure.f4 .hat{
      width:112px;height:20px;left:74px;top:68px;
      border-radius:50px;
      transform:rotate(6deg);
    }

    .center{
      width:min(940px,100%);
      text-align:center;
      display:grid;
      gap:20px;
      position:relative;
      z-index:1;
    }

    .status-line{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .badge{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(215,181,109,.20);
      border-radius:999px;
      padding:8px 14px;
      font-weight:800;
      color:var(--gold-soft);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .quote{
      font-size:clamp(28px,4.8vw,62px);
      font-weight:900;
      line-height:1.28;
      min-height:2.8em;
      color:var(--display-main);
      text-shadow:
        0 2px 0 rgba(0,0,0,.12),
        0 8px 24px rgba(0,0,0,.20);
      letter-spacing:.05em;
      display:grid;
      place-items:center;
      padding:0 2px;
    }

    .speaker{
      font-size:clamp(18px,2.3vw,28px);
      font-weight:900;
      color:var(--display-sub);
      letter-spacing:.12em;
      min-height:1.4em;
      text-shadow:
        0 2px 0 rgba(0,0,0,.10),
        0 4px 12px rgba(0,0,0,.14);
    }

    .typing{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(215,181,109,.18);
      border-radius:24px;
      padding:20px;
      min-height:108px;
      display:grid;
      align-items:center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 10px 24px rgba(0,0,0,.14);
    }

    .romaji{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:clamp(18px,2.2vw,30px);
      line-height:1.6;
      letter-spacing:.06em;
      word-break:break-all;
      font-weight:900;
      text-align:left;
      color:var(--display-main);
    }

    .done{
      color:var(--typed);
      background:var(--typed-bg);
      border-radius:10px;
      padding:0 .08em;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }

    .rest{
      color:var(--display-main);
      text-shadow:
        0 2px 0 rgba(0,0,0,.08),
        0 4px 12px rgba(0,0,0,.10);
    }

    .cursor{
      display:inline-block;
      width:.65em;
      text-align:center;
      color:var(--gold-soft);
      animation:blink 1s step-end infinite;
      font-weight:900;
      text-shadow:0 2px 8px rgba(0,0,0,.18);
    }

    @keyframes blink{
      50%{ opacity:0; }
    }

    .message{
      min-height:1.6em;
      font-size:clamp(16px,2vw,22px);
      font-weight:900;
      color:var(--sub);
    }

    .message.ok{
      color:var(--ok);
      text-shadow:0 2px 8px rgba(0,0,0,.18);
    }

    .message.miss{
      color:var(--miss);
    }

    .bottom{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .stat{
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 14px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .stat .label{
      font-size:13px;
      color:var(--sub);
      font-weight:900;
      letter-spacing:.08em;
    }

    .stat .value{
      margin-top:8px;
      font-size:clamp(22px,3vw,36px);
      font-weight:900;
      color:var(--display-main);
    }

    .overlay{
      position:absolute;
      inset:0;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.26);
      backdrop-filter:blur(2px);
      z-index:5;
    }

    .overlay.show{
      display:grid;
    }

    .count{
      width:160px;
      height:160px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:72px;
      font-weight:900;
      background:linear-gradient(180deg, #fff4d6, #d4af66);
      color:#22170a;
      box-shadow:0 18px 40px rgba(0,0,0,.28);
    }

    .help{
      font-size:14px;
      color:var(--sub);
      margin-top:4px;
      line-height:1.75;
      font-weight:700;
    }

    .result-panel{
      margin-top:8px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(215,181,109,.18);
      border-radius:20px;
      padding:16px;
      display:none;
      box-shadow:0 10px 26px rgba(0,0,0,.16);
    }

    .result-panel.show{
      display:block;
    }

    .result-title{
      font-size:24px;
      font-weight:900;
      margin-bottom:10px;
      color:var(--gold-soft);
    }

    .result-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }

    .result-card{
      background:rgba(255,255,255,.08);
      border-radius:16px;
      padding:12px;
      border:1px solid rgba(215,181,109,.16);
    }

    .result-card .r-label{
      font-size:13px;
      font-weight:900;
      color:var(--sub);
    }

    .result-card .r-value{
      margin-top:6px;
      font-size:30px;
      font-weight:900;
      color:var(--display-main);
    }

    @media (max-width:980px){
      .controls{
        justify-content:flex-start;
      }
      .sound-wrap{
        width:100%;
        justify-content:space-between;
      }
      .sound-select{
        min-width:0;
        width:100%;
      }
    }

    @media (max-width:900px){
      .bottom{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
      .result-grid{
        grid-template-columns:1fr;
      }
      .figure.f1,.figure.f4{ opacity:.28; }
      .figure.f2,.figure.f3{ opacity:.18; }
    }

    @media (max-width:640px){
      .topbar{
        justify-content:center;
      }
      .bottom{
        grid-template-columns:1fr;
      }
      .quote{
        min-height:3.4em;
      }
      .romaji{
        font-size:clamp(17px,4.3vw,24px);
      }
      .figure.f1,.figure.f2,.figure.f3,.figure.f4{
        transform:scale(.66);
      }
      .figure.f2,.figure.f3{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title">名言タイピング練習</div>
        <div class="help">
          スペースキーで 3 秒カウントダウン後に開始。<br>
          プレイ中にもう一度スペースキーで中断。無限モードは正解後 Enter で次へ、Enter を押さなければ同じ名言を繰り返し練習。<br>
          「を」は <strong>WO</strong> 固定表示。「ん」は <strong>N / NN</strong> のどちらでも入力可能。長音符「ー」は <strong>- / ー / ほか一部ダッシュ記号</strong> でも入力可能。
        </div>
      </div>

      <div class="controls" id="modeButtons">
        <button class="mode-btn active" data-mode="10">10問</button>
        <button class="mode-btn" data-mode="30">30問</button>
        <button class="mode-btn" data-mode="50">50問</button>
        <button class="mode-btn" data-mode="infinite">無限</button>

        <label class="sound-wrap">
          <span>効果音</span>
          <select class="sound-select" id="soundSelect" aria-label="効果音選択">
            <option value="simple1">1. ドライクリック</option>
            <option value="simple2">2. クリアタップ</option>
            <option value="simple3">3. シャープキー</option>
            <option value="simple4">4. ライトメタル</option>
            <option value="simple5">5. ソフトチップ</option>
            <option value="simple6">6. タイトビート</option>
            <option value="simple7">7. ペン先タップ</option>
            <option value="simple8">8. ミニスナップ</option>
            <option value="bass">9. 低いバス音</option>
            <option value="fireworks">10. 重低音ファイア</option>
          </select>
        </label>
      </div>
    </div>

    <div class="main">
      <div class="silhouettes" aria-hidden="true">
        <div class="figure f1">
          <div class="hat"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="cape"></div>
        </div>
        <div class="figure f2">
          <div class="hat"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="cape"></div>
        </div>
        <div class="figure f3">
          <div class="hat"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="cape"></div>
        </div>
        <div class="figure f4">
          <div class="hat"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="cape"></div>
        </div>
      </div>

      <div class="overlay" id="overlay">
        <div class="count" id="countText">3</div>
      </div>

      <div class="center">
        <div class="status-line">
          <div class="badge" id="modeLabel">モード：10問</div>
          <div class="badge" id="runLabel">待機中</div>
          <div class="badge" id="soundLabel">効果音：ドライクリック</div>
        </div>

        <div class="quote" id="quote">名言タイピング</div>
        <div class="speaker" id="speaker">人物名</div>

        <div class="typing">
          <div class="romaji" id="romajiView"></div>
        </div>

        <div class="message" id="message">スペースキーで開始</div>

        <div class="result-panel" id="resultPanel">
          <div class="result-title">結果</div>
          <div class="result-grid">
            <div class="result-card">
              <div class="r-label">クリア数</div>
              <div class="r-value" id="resultClear">0</div>
            </div>
            <div class="result-card">
              <div class="r-label">正確率</div>
              <div class="r-value" id="resultAcc">0%</div>
            </div>
            <div class="result-card">
              <div class="r-label">タイム</div>
              <div class="r-value" id="resultTime">0.0s</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="stat">
        <div class="label">進行</div>
        <div class="value" id="progressValue">0 / 10</div>
      </div>
      <div class="stat">
        <div class="label">ミス</div>
        <div class="value" id="missValue">0</div>
      </div>
      <div class="stat">
        <div class="label">正確率</div>
        <div class="value" id="accValue">100%</div>
      </div>
      <div class="stat">
        <div class="label">経過時間</div>
        <div class="value" id="timeValue">0.0s</div>
      </div>
    </div>
  </div>

    function kanaTokenize(str){
      const arr = [];
      for(let i=0;i<str.length;i++){
        const two = str.slice(i,i+2);
        if(DIGRAPHS[two]){
          arr.push(two);
          i++;
        }else{
          arr.push(str[i]);
        }
      }
      return arr;
    }

    function getRomanForToken(token){
      if(DIGRAPHS[token]) return DIGRAPHS[token];
      if(BASIC[token]) return BASIC[token];
      if(token === "ー") return "-";
      return token.toUpperCase();
    }

    function getInitialConsonant(roman){
      if(!roman) return "";
      const m = roman.match(/^[^AEIOU]+/);
      return m ? m[0][0] : "";
    }

    function buildSegments(kana){
      const tokens = kanaTokenize(kana);
      const segments = [];

      for(let i=0;i<tokens.length;i++){
        const t = tokens[i];

        if(t === "っ"){
          const next = tokens[i+1];
          const nextRoman = getRomanForToken(next);
          const c = getInitialConsonant(nextRoman);
          if(c){
            segments.push({
              display:c,
              inputs:[c]
            });
          }
          continue;
        }

        if(t === "ん"){
          segments.push({
            display:"N",
            inputs:["N","NN"]
          });
          continue;
        }

        if(t === "ー"){
          segments.push({
            display:"-",
            inputs:["-"]
          });
          continue;
        }

        const roman = getRomanForToken(t);
        segments.push({
          display:roman,
          inputs:[roman]
        });
      }

      return segments;
    }

    function expandVariantsFromSegments(segments){
      let displayPos = 0;
      let variants = [{ input:"", progressMap:[] }];

      for(const seg of segments){
        const nextVariants = [];

        for(const variant of variants){
          for(const opt of seg.inputs){
            const progressMap = [...variant.progressMap];
            for(let i=0;i<opt.length;i++){
              if(seg.display === "N" && opt === "NN"){
                progressMap.push(displayPos + 1);
              }else{
                const ratio = Math.min(seg.display.length, i + 1);
                progressMap.push(displayPos + ratio);
              }
            }

            nextVariants.push({
              input:variant.input + opt,
              progressMap
            });
          }
        }

        variants = dedupeVariants(nextVariants);
        displayPos += seg.display.length;
      }

      return variants;
    }

    function dedupeVariants(list){
      const seen = new Map();
      for(const item of list){
        const key = item.input + "|" + item.progressMap.join(",");
        if(!seen.has(key)){
          seen.set(key, item);
        }
      }
      return [...seen.values()];
    }

    function buildTypingModel(kana){
      const segments = buildSegments(kana);
      const display = segments.map(seg=>seg.display).join("");
      const variants = expandVariantsFromSegments(segments);
      return { display, variants };
    }

    function shuffle(array){
      const a = [...array];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function normalizeTypingKey(key){
      if(!key) return null;

      if(/^[a-zA-Z]$/.test(key)) return key.toUpperCase();

      const dashKeys = ["-","ー","－","―","ｰ","‐","-","‒","–","—","−","_"];
      if(dashKeys.includes(key)) return "-";

      return null;
    }

    let audioCtx = null;

    function ensureAudio(){
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({
          latencyHint:"interactive"
        });
      }
      if(audioCtx.state === "suspended"){
        audioCtx.resume();
      }
    }

    function createNoiseBuffer(duration){
      const sampleRate = audioCtx.sampleRate;
      const length = Math.floor(sampleRate * duration);
      const buffer = audioCtx.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<length;i++){
        data[i] = Math.random() * 2 - 1;
      }
      return buffer;
    }

    function playTone({freq = 440, type = "sine", gain = 0.2, duration = 0.05, start = 0, endFreq = null, filter = null}){
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      if(filter){
        const f = audioCtx.createBiquadFilter();
        f.type = filter.type || "lowpass";
        f.frequency.value = filter.frequency || 1800;
        f.Q.value = filter.q || 0.7;
        osc.connect(f);
        f.connect(g);
      }else{
        osc.connect(g);
      }

      osc.type = type;
      const now = audioCtx.currentTime + start;
      osc.frequency.setValueAtTime(freq, now);
      if(endFreq !== null){
        osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), now + duration);
      }

      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), now + 0.003);
      g.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      g.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.01);
    }

    function playNoise({gain = 0.08, duration = 0.03, start = 0, filterType = "bandpass", frequency = 2000, q = 0.8}){
      if(!audioCtx) return;
      const src = audioCtx.createBufferSource();
      const g = audioCtx.createGain();
      const f = audioCtx.createBiquadFilter();
      const now = audioCtx.currentTime + start;

      src.buffer = createNoiseBuffer(duration);
      f.type = filterType;
      f.frequency.value = frequency;
      f.Q.value = q;
      g.gain.setValueAtTime(gain, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      src.connect(f);
      f.connect(g);
      g.connect(audioCtx.destination);
      src.start(now);
      src.stop(now + duration + 0.01);
    }

    function currentPreset(){

    function playKeySound(){
      if(!audioCtx) return;
      const p = currentPreset();

      if(p.mode === "bass"){
        playTone({freq:p.osc1, type:"triangle", gain:p.gain, duration:p.decay, endFreq:p.osc1 * 0.88, filter:{type:"lowpass", frequency:520, q:0.5}});
        playTone({freq:p.osc2, type:"sine", gain:p.gain * 0.52, duration:p.decay * 1.15, endFreq:Math.max(20, p.osc2 * 0.9), filter:{type:"lowpass", frequency:360, q:0.4}});
        return;
      }

      if(p.mode === "fireworks"){
        playTone({freq:p.osc1, type:"sine", gain:p.gain, duration:p.decay, endFreq:28, filter:{type:"lowpass", frequency:240, q:0.9}});
        playTone({freq:p.osc2, type:"triangle", gain:p.gain * 0.52, duration:p.decay * 1.15, endFreq:22, filter:{type:"lowpass", frequency:170, q:0.8}});
        playNoise({gain:0.028, duration:0.08, start:0.012, filterType:"bandpass", frequency:1200, q:0.4});
        return;
      }

      playTone({freq:p.osc1, type:"square", gain:p.gain * 0.42, duration:p.decay, endFreq:p.osc1 * 0.96, filter:{type:"bandpass", frequency:p.osc1, q:0.7}});
      playTone({freq:p.osc2, type:"triangle", gain:p.gain * 0.9, duration:p.decay * 1.2, endFreq:Math.max(50, p.osc2 * 0.92), filter:{type:"lowpass", frequency:1400, q:0.5}});
      playNoise({gain:p.noise, duration:Math.max(0.012, p.decay), filterType:"bandpass", frequency:p.osc1, q:0.9});
    }

    function playCorrectSound(){
      if(!audioCtx) return;
      const p = currentPreset();

      if(p.mode === "fireworks"){
        playTone({freq:160, type:"sine", gain:0.24, duration:0.16, endFreq:78, filter:{type:"lowpass", frequency:300, q:0.8}});
        playTone({freq:480, type:"triangle", gain:0.10, duration:0.12, start:0.015, endFreq:260, filter:{type:"bandpass", frequency:900, q:0.7}});
        playNoise({gain:0.03, duration:0.10, start:0.02, filterType:"highpass", frequency:1800, q:0.5});
        return;
      }

      if(p.mode === "bass"){
        playTone({freq:220, type:"triangle", gain:0.20, duration:0.14, endFreq:180, filter:{type:"lowpass", frequency:520, q:0.4}});
        playTone({freq:330, type:"sine", gain:0.11, duration:0.10, start:0.01, endFreq:300, filter:{type:"lowpass", frequency:900, q:0.4}});
        return;
      }

      playTone({freq:p.correct, type:"triangle", gain:0.16, duration:0.11, endFreq:p.correct * 1.25, filter:{type:"lowpass", frequency:2400, q:0.4}});
      playTone({freq:p.correct * 1.5, type:"sine", gain:0.09, duration:0.10, start:0.014, endFreq:p.correct * 1.72, filter:{type:"lowpass", frequency:2800, q:0.4}});
    }

    function playMissSound(){
      if(!audioCtx) return;
      const p = currentPreset();

      if(p.mode === "fireworks"){
        playTone({freq:78, type:"sawtooth", gain:0.20, duration:0.16, endFreq:36, filter:{type:"lowpass", frequency:240, q:0.9}});
        playNoise({gain:0.02, duration:0.05, filterType:"lowpass", frequency:700, q:0.6});
        return;
      }

      if(p.mode === "bass"){
        playTone({freq:84, type:"triangle", gain:0.18, duration:0.11, endFreq:50, filter:{type:"lowpass", frequency:300, q:0.8}});
        return;
      }

      playTone({freq:p.miss, type:"sawtooth", gain:0.14, duration:0.08, endFreq:Math.max(40, p.miss * 0.72), filter:{type:"lowpass", frequency:850, q:0.9}});
      playNoise({gain:0.025, duration:0.035, filterType:"lowpass", frequency:900, q:0.8});
    }

    function buildQueue(){
      const shuffled = shuffle(WORDS);
      if(state.isInfinite) return shuffled;

      const count = Number(state.mode);
      const pool = [];
      while(pool.length < count){
        pool.push(...shuffle(WORDS));
      }
      return pool.slice(0, count);
    }

    function startCountdown(){
      if(state.isCounting || state.isRunning) return;

      clearRepeatTimer();
      ensureAudio();
      state.isCounting = true;
      el.resultPanel.classList.remove("show");
      el.overlay.classList.add("show");
      el.runLabel.textContent = "カウントダウン";
      setMessage("開始します", "");

      const seq = ["3","2","1","START"];
      el.countText.textContent = seq[0];

      state.countdownTimers.forEach(id=>clearTimeout(id));
      state.countdownTimers = [];

      seq.forEach((text,idx)=>{
        const id = setTimeout(()=>{
          el.countText.textContent = text;
        }, idx * 700);
        state.countdownTimers.push(id);
      });

      const endId = setTimeout(()=>{
        el.overlay.classList.remove("show");
        state.isCounting = false;
        beginGame();
      }, seq.length * 700);
      state.countdownTimers.push(endId);
    }

    function beginGame(){
      clearRepeatTimer();
      state.queue = buildQueue();
      state.currentIndex = 0;
      state.typedInput = "";
      state.activeVariants = [];
      state.misses = 0;
      state.totalKeys = 0;
      state.correctKeys = 0;
      state.repeatCount = 0;
      state.awaitingEnter = false;
      state.canAdvanceInfinite = false;
      state.isRunning = true;
      state.isFinished = false;
      state.startTime = performance.now();
      state.endTime = 0;

      if(state.timerId) cancelAnimationFrame(state.timerId);
      tickTimer();

      el.runLabel.textContent = "プレイ中";
      nextWord(true);
      updateStats();
    }

    function stopGame(manual = true){
      clearRepeatTimer();
      state.isCounting = false;
      state.isRunning = false;
      state.awaitingEnter = false;
      state.canAdvanceInfinite = false;
      state.endTime = performance.now();

      state.countdownTimers.forEach(id=>clearTimeout(id));
      state.countdownTimers = [];
      el.overlay.classList.remove("show");

      if(state.timerId) cancelAnimationFrame(state.timerId);
      el.runLabel.textContent = manual ? "中断" : "終了";

      if(manual){
        setMessage("停止しました。スペースキーで最初から再開", "");
      }
      updateStats();
    }

    function finishGame(){
      clearRepeatTimer();
      state.isRunning = false;
      state.isFinished = true;
      state.awaitingEnter = false;
      state.canAdvanceInfinite = false;
      state.endTime = performance.now();

      if(state.timerId) cancelAnimationFrame(state.timerId);
      el.runLabel.textContent = "終了";
      setMessage("おつかれさまでした。スペースキーで再スタート", "ok");

      const cleared = state.currentIndex;
      const acc = calcAccuracy();
      const time = elapsedSec();

      el.resultClear.textContent = String(cleared);
      el.resultAcc.textContent = `${acc}%`;
      el.resultTime.textContent = `${time.toFixed(1)}s`;
      el.resultPanel.classList.add("show");
      updateStats();
    }

    function tickTimer(){
      if(!state.isRunning) return;
      el.timeValue.textContent = `${elapsedSec().toFixed(1)}s`;
      state.timerId = requestAnimationFrame(tickTimer);
    }

    function elapsedSec(){
      if(!state.startTime) return 0;
      const end = state.isRunning ? performance.now() : (state.endTime || performance.now());
      return (end - state.startTime) / 1000;
    }

    function prepareCurrentWord(word){
      const typing = buildTypingModel(word.kana);
      return {
        ...word,
        displayRoman:typing.display,
        variants:typing.variants
      };
    }

    function nextWord(initial = false){
      clearRepeatTimer();

      if(state.isInfinite){
        if(initial || !state.current){
          if(state.currentIndex === 0){
            state.queue = shuffle(WORDS);
          }
          const idx = state.currentIndex % state.queue.length;
          state.current = prepareCurrentWord(state.queue[idx]);
          state.currentIndex = state.currentIndex || 0;
        }
      }else{
        if(state.currentIndex >= state.queue.length){
          finishGame();
          return;
        }
        state.current = prepareCurrentWord(state.queue[state.currentIndex]);
      }

      state.awaitingEnter = false;
      state.canAdvanceInfinite = false;
      state.typedInput = "";
      state.activeVariants = [...state.current.variants];

      el.quote.textContent = state.current.quote;
      el.speaker.textContent = state.current.speaker;
      renderRomaji();
      updateStats();

      if(state.isInfinite){
        setMessage("入力して練習。正解後 Enter で次へ", "");
      }else{
        setMessage("入力開始", "");
      }
    }

    function repeatCurrentWord(){
      clearRepeatTimer();
      state.awaitingEnter = false;
      state.typedInput = "";
      state.activeVariants = [...state.current.variants];
      renderRomaji();
      state.repeatCount++;
      updateStats();
      setMessage("同じ名言をもう一度。Enter で次の名言へ", "");
    }

    function currentDisplayProgress(){
      if(!state.current) return 0;
      if(state.typedInput.length === 0) return 0;

      let max = 0;
      for(const variant of state.activeVariants){
        const idx = state.typedInput.length - 1;
        if(idx >= 0 && idx < variant.progressMap.length){
          max = Math.max(max, variant.progressMap[idx]);
        }
      }
      return max;
    }

    function renderRomaji(initialText = null){
      const target = initialText !== null ? initialText : (state.current?.displayRoman || "");
      const progress = initialText !== null ? 0 : currentDisplayProgress();

      const done = escapeHtml(target.slice(0, progress));
      const rest = escapeHtml(target.slice(progress));

      const cursorHtml = progress >= target.length
        ? ""
        : `<span class="cursor">|</span>`;

      el.romajiView.innerHTML = `
        <span class="done">${done}</span>${cursorHtml}<span class="rest">${rest}</span>
      `;
    }

    function escapeHtml(str){
      return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function setMessage(text, type=""){
      el.message.textContent = text;
      el.message.className = "message" + (type ? ` ${type}` : "");
    }

    function calcAccuracy(){
      if(state.totalKeys === 0) return 100;
      return Math.max(0, Math.round((state.correctKeys / state.totalKeys) * 100));
    }

    function updateStats(){
      el.missValue.textContent = String(state.misses);
      el.accValue.textContent = `${calcAccuracy()}%`;

      if(state.isInfinite){
        el.progressValue.textContent = `${state.currentIndex} 件クリア / 同文反復 ${state.repeatCount}`;
      }else{
        el.progressValue.textContent = `${state.currentIndex} / ${state.mode}`;
      }

      if(!state.isRunning){
        if(state.isFinished || state.endTime){
          el.timeValue.textContent = `${elapsedSec().toFixed(1)}s`;
        }else{
          el.timeValue.textContent = "0.0s";
        }
      }
    }

    function advanceWordFinite(){
      clearRepeatTimer();
      state.currentIndex++;
      if(state.currentIndex >= state.queue.length){
        finishGame();
      }else{
        nextWord();
      }
      updateStats();
    }

    function advanceWordInfinite(){
      clearRepeatTimer();
      state.currentIndex++;
      state.awaitingEnter = false;
      state.canAdvanceInfinite = false;

      const idx = state.currentIndex % state.queue.length;
      if(idx === 0){
        state.queue = shuffle(WORDS);
      }

      state.current = prepareCurrentWord(state.queue[idx]);
      state.typedInput = "";
      state.activeVariants = [...state.current.variants];
      el.quote.textContent = state.current.quote;
      el.speaker.textContent = state.current.speaker;
      renderRomaji();
      updateStats();
      setMessage("入力して練習。正解後 Enter で次へ", "");
    }

    function onCorrectComplete(){
      clearRepeatTimer();
      ensureAudio();
      playCorrectSound();

      if(state.isInfinite){
        state.awaitingEnter = true;
        state.canAdvanceInfinite = true;
        setMessage("正解。Enter で次へ / そのまま同じ名言を繰り返し練習", "ok");
      }else{
        setMessage("正解", "ok");
        state.repeatTimer = setTimeout(()=>{
          if(state.isRunning){
            advanceWordFinite();
          }
        }, 260);
      }
    }

    function exactMatchReached(input){
      return state.activeVariants.some(v => v.input === input);
    }

    function nextExpectedKeys(input){
      const set = new Set();
      for(const v of state.current.variants){
        if(v.input.startsWith(input) && v.input.length > input.length){
          set.add(v.input[input.length]);
        }
      }
      return [...set];
    }

    function handleTypingKey(rawKey){
      if(!state.current) return;

      const key = normalizeTypingKey(rawKey);

      if(state.awaitingEnter && state.isInfinite && key){
        repeatCurrentWord();
      }

      if(!key) return;

      ensureAudio();

      const nextInput = state.typedInput + key;
      const nextVariants = state.activeVariants.filter(v => v.input.startsWith(nextInput));

      state.totalKeys++;

      if(nextVariants.length > 0){
        state.correctKeys++;
        state.typedInput = nextInput;
        state.activeVariants = nextVariants;
        playKeySound();
        renderRomaji();

        if(exactMatchReached(nextInput)){
          onCorrectComplete();
        }else{
          setMessage("入力中", "");
        }
      }else{
        state.misses++;
        playMissSound();
        const hints = nextExpectedKeys(state.typedInput);
        const hintText = hints.length ? hints.join(" / ") : "?";
        setMessage(`ミス：次は "${hintText}"`, "miss");
      }

      updateStats();
    }

    document.addEventListener("keydown",(e)=>{
      const key = e.key;

      if(key === " " || key === "Spacebar"){
        e.preventDefault();
        ensureAudio();

        if(state.isCounting){
          stopGame(true);
          return;
        }

        if(state.isRunning){
          stopGame(true);
          return;
        }

        startCountdown();
        return;
      }

      if(!state.isRunning) return;

      if(key === "Enter"){
        e.preventDefault();
        if(state.isInfinite && state.canAdvanceInfinite){
          advanceWordInfinite();
        }
        return;
      }

      const normalized = normalizeTypingKey(key);
      if(normalized){
        e.preventDefault();
        handleTypingKey(key);
      }
    });

    el.modeButtons.addEventListener("click",(e)=>{
      const btn = e.target.closest(".mode-btn");
      if(!btn || !btn.dataset.mode) return;
      setMode(btn.dataset.mode);
    });

    el.soundSelect.addEventListener("change",(e)=>{
      ensureAudio();
      setSoundType(e.target.value);
      playKeySound();
    });

    setSoundType("simple1");
    setMode("10");
  </script>
</body>
</html>
